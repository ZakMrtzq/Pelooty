<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pelooty</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%91%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#0B0F14; --bg2:#111720;
    --card:#151C26; --card2:#1B2431; --line:#293647; --line2:#3A4A60;
    --ink:#F6F8FB; --muted:#9BA8B8;
    --accent:#72D5FF; --accent2:#8B9CFF; --accent-dim:#20384A; --accent-soft:rgba(114,213,255,.14);
    --done:#63E6BE; --done-dim:#173E37;
    --blue:#8FB8FF;
    --r:20px; --r-sm:13px; --pad:18px;
    --grad:linear-gradient(135deg,var(--accent),var(--accent2));
    --shadow:0 14px 38px rgba(0,0,0,.32);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  html,body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-feature-settings:"tnum" 1}
  body{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:calc(44px + env(safe-area-inset-bottom));overflow-x:hidden;
    background:
      radial-gradient(110% 46% at 50% -6%, #142236 0%, transparent 60%),
      radial-gradient(90% 40% at 50% 108%, #111B2B 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  input,textarea{font-size:16px}
  ::selection{background:var(--accent-soft)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:999px}
  ::-webkit-scrollbar-track{background:transparent}

  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,217,160,.55)}70%{box-shadow:0 0 0 7px rgba(111,217,160,0)}100%{box-shadow:0 0 0 0 rgba(111,217,160,0)}}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-3px) rotate(4deg)}}
  @keyframes shim{0%{background-position:-140px 0}100%{background-position:220px 0}}
  @keyframes glowp{0%,100%{box-shadow:0 0 14px rgba(99,230,190,.38)}50%{box-shadow:0 0 26px rgba(99,230,190,.72)}}
  @keyframes popin{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes chartDraw{from{stroke-dashoffset:700}to{stroke-dashoffset:0}}

  /* ===== header ===== */
  .top{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:14px var(--pad) 10px;
    background:rgba(11,15,20,.78);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);
    border-bottom:1px solid rgba(255,255,255,.05)}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .dot{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:21px;
    animation:floaty 4.5s ease-in-out infinite;filter:drop-shadow(0 3px 10px rgba(114,213,255,.32))}
  .brand h1{font-size:15px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sbtn{width:44px;height:44px;border-radius:14px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .12s}
  .sbtn:active{transform:scale(.9)}
  .live{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .live .b{width:7px;height:7px;border-radius:50%;background:#5b4f58}
  .live.on .b{background:var(--done);animation:pulse 2s infinite}
  .wk{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
  .wk button{width:44px;height:44px;border-radius:999px;color:var(--muted);font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .wk button:active{background:var(--card2);color:var(--accent);transform:scale(.9)}
  .wk .lab{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--muted);padding:0 7px;min-width:62px;text-align:center}
  .wk .lab b{color:var(--ink)}
  .clockbar{text-align:center;font-size:12px;color:var(--muted);letter-spacing:.04em;padding:9px 0 2px}
  .presbar{display:none;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px;padding:2px 12px 10px;font-size:10.5px;color:var(--muted)}
  .pchip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 11px;max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .pchip b{color:var(--ink);font-weight:650}
  .pchip .plbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:52vw}
  .pchip .pdot{margin-right:0}
  .pchip.perr{border-color:#7a3b3b;color:#e8a0a0}
  .pchip.psend{border-color:var(--accent);color:var(--ink);cursor:pointer;transition:transform .1s}
  .pchip.psend:active{transform:scale(.94)}
  .stoast{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:9500;background:var(--card2);border:1px solid var(--accent);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;box-shadow:0 10px 28px rgba(0,0,0,.45);pointer-events:none}
  .pdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .pdot.on{background:var(--done);animation:pulse 2.4s infinite}
  .pdot.off{background:#5b4f58}

  /* ===== screens ===== */
  .screen{padding:2px var(--pad) 0;animation:fade .3s cubic-bezier(.2,.8,.3,1)}
  @media (prefers-reduced-motion:reduce){.screen,.day,.ex,.set,.gcard,.klev,.brand .dot,.crit,.progress-trend,.progress-bar{animation:none!important}*{transition-duration:.01ms!important}}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:10px 2px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .eyebrow .who{color:var(--muted);text-transform:none;letter-spacing:0;font-size:11px;white-space:nowrap;display:flex;align-items:center;gap:8px;min-width:0}
  .eyebrow .whoe{overflow:hidden;text-overflow:ellipsis;min-width:0}
  .eyebrow .who button{color:var(--accent);font-weight:700;flex:0 0 auto}

  /* ===== day cards ===== */
  .weekhero{position:relative;overflow:hidden;background:linear-gradient(145deg,#172334,#121923);border:1px solid #2A3C52;border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .weekhero:after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;right:-70px;top:-105px;background:radial-gradient(circle,rgba(114,213,255,.22),transparent 68%);pointer-events:none}
  .wktopline{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;position:relative;z-index:1}
  .wkcopy{font-size:12px;color:var(--muted);line-height:1.5}
  .wkcopy b{display:block;color:var(--ink);font-size:18px;letter-spacing:-.02em}
  .wkpct{font-size:34px;font-weight:850;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .wkprogress{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;margin-top:16px;border:1px solid var(--line)}
  .wkprogress span{display:block;height:100%;width:0;background:var(--grad);border-radius:inherit;transition:width .45s cubic-bezier(.2,.8,.3,1)}
  .days{display:flex;flex-direction:column;gap:11px}
  @media (min-width:700px){.days{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.screen{padding-left:24px;padding-right:24px}.top{padding-left:24px;padding-right:24px}}
  .day{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;text-align:left;width:100%;
    box-shadow:var(--shadow);transition:transform .14s cubic-bezier(.2,.8,.3,1),border-color .14s;animation:rise .5s cubic-bezier(.2,.8,.3,1) backwards}
  .day:active{transform:scale(.975);border-color:var(--accent-dim)}
  .ring{width:50px;height:50px;border-radius:15px;flex:0 0 auto;padding:3px;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*3.6deg),var(--line) 0);transition:background .5s}
  .ring.full{background:conic-gradient(var(--done) 360deg,var(--done) 0);animation:glowp 2.6s ease-in-out infinite}
  .day .ix{width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--bg2)}
  .t-hyp .ix{color:var(--accent)}
  .t-neu .ix{color:var(--done)}
  .t-rest .ix{color:var(--blue)}
  .day .body{flex:1;min-width:0}
  .day .body .nm{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .day .body .sub{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:8px;align-items:center}
  .pill{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .pill.hyp{background:var(--accent-soft);color:var(--accent)}
  .pill.neu{background:rgba(111,217,160,.12);color:var(--done)}
  .pill.rest{background:rgba(143,184,232,.12);color:var(--blue)}
  .day .meta{flex:0 0 auto;text-align:right}
  .day .meta .big{font-size:18px;font-weight:800}
  .day .meta .cap{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
  .chev{color:var(--muted);font-size:20px;flex:0 0 auto;opacity:.7}

  /* ===== session ===== */
  .back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700;padding:8px 0 4px;transition:color .12s}
  .back:active{color:var(--accent)}
  .shead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:4px 0 16px}
  .shead h2{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .shead .date{font-size:12px;color:var(--muted);white-space:nowrap}
  .smeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .ex{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--r);
    margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);animation:rise .45s cubic-bezier(.2,.8,.3,1) backwards;transition:border-color .2s}
  .ex.open{border-color:var(--line2)}
  .ex .row{display:flex;align-items:center;gap:12px;padding:15px 16px;width:100%;text-align:left}
  .ex .nm{flex:1;min-width:0}
  .ex .nm .t{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.01em}
  .ex .nm .tg{font-size:11px;color:var(--muted);margin-top:3px}
  .badge{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:999px;
    background:var(--bg2);color:var(--muted);white-space:nowrap;transition:all .2s}
  .badge.hit{background:var(--done-dim);color:var(--done);animation:popin .35s cubic-bezier(.2,1.4,.3,1)}
  .ex .panel{border-top:1px solid var(--line);padding:15px 16px 16px;display:none;background:rgba(0,0,0,.16)}
  .ex.open .panel{display:block;animation:panelReveal .34s cubic-bezier(.2,.8,.3,1)}
  @keyframes panelReveal{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .chev2{color:var(--muted);font-size:18px;transition:transform .2s cubic-bezier(.2,.8,.3,1);opacity:.7}
  .ex.open .chev2{transform:rotate(90deg);color:var(--accent);opacity:1}
  .sub-h{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .workout-lead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:10px}
  .workout-lead .sub-h{margin:0}
  .workout-lead span{font-size:11px;color:var(--muted);text-align:right}
  .panel-tools{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:12px}
  .panel-tools.two{grid-template-columns:repeat(2,minmax(0,1fr))}
  .toolbtn{min-height:46px;padding:0 10px;border:1px solid var(--line);border-radius:12px;background:var(--bg2);color:var(--muted);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .14s,border-color .18s,color .18s,background .18s}
  .toolbtn:active{transform:scale(.96)}
  .toolbtn.on{color:var(--accent);border-color:var(--accent-dim);background:var(--accent-soft)}
  .toolbtn .ti{font-size:15px}
  .ex-subpanel{display:none;margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:14px;background:rgba(5,10,16,.34)}
  .ex-subpanel.on{display:block;animation:drawerIn .28s cubic-bezier(.2,.8,.3,1)}
  @keyframes drawerIn{from{opacity:0;transform:translateY(-6px) scale(.99)}to{opacity:1;transform:none}}
  .ex-subpanel .coach-edit{margin-bottom:0}
  .pane-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
  .pane-title b{font-size:13px}
  .pane-title span{font-size:10px;color:var(--muted)}
  .coach-edit{display:grid;grid-template-columns:minmax(110px,1fr) 56px 56px 74px;gap:8px;margin-bottom:15px;align-items:end}
  @media (max-width:370px){.coach-edit{grid-template-columns:1fr 1fr}}
  .cfield{display:flex;flex-direction:column;gap:5px;min-width:0}
  .cfield label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .cfield input,.cfield select{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 10px;font-size:16px;font-weight:600;width:100%;transition:border-color .15s}
  .cfield input:focus,.cfield select:focus{outline:none;border-color:var(--accent)}
  .sets{display:grid;gap:8px;margin-bottom:13px}
  .set{display:grid;grid-template-columns:auto minmax(150px,1.05fr) minmax(112px,.9fr) 70px auto;align-items:end;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:9px;transition:border-color .15s;animation:setEnter .3s cubic-bezier(.2,.8,.3,1) backwards}
  @keyframes setEnter{from{opacity:0;transform:translateX(-7px)}to{opacity:1;transform:none}}
  .set.timed{grid-template-columns:auto minmax(138px,1fr) minmax(112px,.9fr) auto}
  .set:focus-within{border-color:var(--accent)}
  .set .sx{font-size:10px;color:var(--muted);font-weight:800;align-self:center;min-width:27px;text-transform:uppercase;letter-spacing:.06em}
  .repstep{display:grid;grid-template-columns:44px 1fr 44px;align-items:end;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card)}
  .set button{width:44px;height:44px;font-size:17px;font-weight:700;color:var(--muted);transition:all .1s}
  .set button:active{background:var(--card2);color:var(--accent);transform:scale(.88)}
  .setfield{display:flex;flex-direction:column;gap:3px;min-width:0}
  .setfield>span{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .repstep .setfield>span{text-align:center;padding-top:4px}
  .setfield input,.setfield select{width:100%;height:29px;border:0;border-bottom:1px solid transparent;background:transparent;font-size:16px;font-weight:750;min-width:0}
  .loadfield,.rirfield{padding-bottom:2px}
  .loadfield input,.rirfield select{height:30px;padding:0 7px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  .set .vIn{height:27px;text-align:center;font-size:16px;font-weight:800;background:transparent;border:none;-moz-appearance:textfield}
  .set .vIn::-webkit-outer-spin-button,.set .vIn::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .setfield input:focus,.setfield select:focus,.set .vIn:focus{outline:none;border-color:var(--accent)}
  .set .vIn.ok{color:var(--done)}
  .set .rm{width:44px;height:44px;color:var(--accent2);font-size:13px;opacity:.75;align-self:center}
  .addset{height:46px;padding:0 15px;border:1px dashed var(--line2);border-radius:13px;color:var(--muted);font-size:13px;font-weight:700;transition:all .15s}
  .addset:active{border-color:var(--accent);color:var(--accent);transform:scale(.96)}
  @media (max-width:500px){.set,.set.timed{grid-template-columns:30px minmax(0,1fr) 82px 44px;align-items:center}.set .sx{grid-column:1;grid-row:1}.repstep{grid-column:2/4;grid-row:1}.set .loadfield{grid-column:2;grid-row:2}.set.timed .loadfield{grid-column:2/4}.set .rirfield{grid-column:3;grid-row:2}.set .rm{grid-column:4;grid-row:1}.panel-tools{grid-template-columns:1fr}.panel-tools.two{grid-template-columns:1fr 1fr}.workout-lead{align-items:flex-start;flex-direction:column;gap:3px}.workout-lead span{text-align:left}}
  .vol{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg2);border-radius:13px;padding:12px 14px;border:1px solid var(--line)}
  .vol .l{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted)}
  .vol .r{font-size:16px;font-weight:800}
  .vol .r .of{color:var(--muted);font-weight:600;font-size:13px}
  .hint{font-size:12px;margin-top:10px;padding:11px 13px;border-radius:11px;line-height:1.5;transition:all .25s}
  .hint.go{background:var(--done-dim);color:#BFEFD4}
  .hint.wait{background:var(--card2);color:var(--muted)}
  .pnote{margin-top:14px}
  .pnote h4{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  .pnote textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:16px;line-height:1.5;resize:vertical;min-height:52px;transition:border-color .15s}
  .pnote textarea:focus{outline:none;border-color:var(--accent)}
  .pnote+.pnote{margin-top:10px}
  .ex-subpanel .pnote{margin-top:0}
  .ex-subpanel .pnote+.pnote{margin-top:10px}
  .exdel{margin-top:14px;text-align:right}
  .exdel button{color:var(--accent2);font-size:12px;font-weight:700;opacity:.85}
  .progress-card{padding:16px;border-radius:16px;background:linear-gradient(180deg,rgba(114,213,255,.07),rgba(17,23,32,.7));border:1px solid var(--line)}
  .progress-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .progress-title b{font-size:14px}
  .progress-title span{display:block;font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
  .progress-modes{display:flex;gap:3px;padding:3px;background:var(--bg);border:1px solid var(--line);border-radius:10px;flex:0 0 auto}
  .progress-modes button{padding:6px 8px;border-radius:7px;font-size:10px;font-weight:750;color:var(--muted)}
  .progress-modes button.on{background:var(--card2);color:var(--accent)}
  .progress-loading,.progress-empty{min-height:118px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:12px;line-height:1.5}
  .progress-content{display:block;min-height:0}
  .progress-overview{display:grid;gap:10px;align-items:stretch}
  .progress-chart{width:100%;overflow:hidden;border-radius:12px;background:rgba(5,10,16,.38)}
  .progress-chart svg{display:block;width:100%;height:auto;overflow:visible}
  .progress-grid{stroke:var(--line);stroke-width:1}
  .progress-trend{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:700;animation:chartDraw .75s cubic-bezier(.2,.8,.3,1) both;filter:drop-shadow(0 0 5px var(--accent-soft))}
  .progress-average{fill:none;stroke:var(--muted);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:5 5;opacity:.85}
  .progress-bar{fill:var(--accent);opacity:.7;transform-origin:bottom;animation:barRise .5s cubic-bezier(.2,.8,.3,1) both}
  .progress-dot{fill:var(--bg);stroke:var(--accent);stroke-width:3}
  .progress-axis{fill:var(--muted);font-size:9px;font-weight:650}
  .progress-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:0}
  .progress-stat{padding:10px 11px;border-radius:11px;background:var(--bg);border:1px solid var(--line);min-width:0}
  .progress-stat span{display:block;font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .progress-stat b{display:block;font-size:13px;line-height:1.25;overflow:visible;text-overflow:clip;white-space:normal}

  .progress-stat b.down{color:#FF9A9A}
  .progress-note{display:grid;grid-template-columns:auto 1fr;gap:10px;font-size:11px;color:var(--muted);line-height:1.5;margin-top:11px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:rgba(5,10,16,.28)}
  .progress-note b{width:21px;height:21px;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-size:10px}
  .resistance-filter{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px}
  .resistance-filter button{flex:0 0 auto;font-size:9px;color:var(--muted);padding:6px 9px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-weight:750}
  .resistance-filter button.on{color:var(--accent);border-color:var(--accent-dim);background:var(--accent-soft)}
  .pr-section{margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}
  .pr-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .pr-ladder{display:flex;gap:6px;overflow-x:auto}
  .pr-chip{flex:0 0 auto;font-size:9px;color:var(--muted);padding:6px 8px;border-radius:9px;background:var(--card);border:1px solid var(--line)}
  .pr-chip b{color:var(--ink);font-size:10px}
  @media(min-width:640px){.progress-overview{grid-template-columns:minmax(0,1fr) 176px}.progress-summary{grid-template-columns:1fr;grid-template-rows:repeat(3,minmax(0,1fr))}.progress-stat{display:flex;flex-direction:column;justify-content:center}}
  @media(max-width:639px){.progress-summary{grid-template-columns:repeat(3,minmax(0,1fr))}}
  @media(max-width:480px){.progress-title{align-items:stretch;flex-direction:column}.progress-modes{width:100%}.progress-modes button{flex:1}.progress-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.progress-stat:first-child{grid-column:1/-1}.progress-note{grid-template-columns:1fr}.progress-card{padding:13px}}
  @keyframes barRise{from{opacity:0;transform:scaleY(.1)}to{opacity:.7;transform:scaleY(1)}}
  .addex{width:100%;border:1px dashed var(--line2);border-radius:var(--r);padding:15px;color:var(--muted);font-size:14px;font-weight:700;margin-bottom:12px;transition:all .15s}
  .addex:active{border-color:var(--accent);color:var(--accent);transform:scale(.985)}
  .addform{background:var(--card2);border:1px solid var(--accent-dim);border-radius:var(--r);padding:16px;margin-bottom:12px;animation:rise .3s ease;box-shadow:var(--shadow)}
  .addform .fr{display:flex;gap:8px;margin-bottom:10px}
  .addform input{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:16px;width:100%}
  .addform input:focus{outline:none;border-color:var(--accent)}
  .addform .w{width:74px;flex:0 0 auto;text-align:center}
  .addform .acts{display:flex;gap:8px;justify-content:flex-end}
  .addform .acts button{padding:9px 18px;border-radius:11px;font-size:13px;font-weight:800}
  .addform .save{background:var(--grad);color:#071116}
  .addform .cancel{color:var(--muted)}

  /* ===== home extras / games ===== */
  .gcard{display:flex;align-items:center;gap:14px;width:100%;background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;text-align:left;margin-top:11px;
    box-shadow:var(--shadow);animation:rise .5s cubic-bezier(.2,.8,.3,1) backwards;transition:transform .14s,border-color .14s}
  .gcard:active{transform:scale(.975);border-color:var(--accent-dim)}
  .gcard .gico{width:48px;height:48px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg2);border-radius:14px}
  .gcard .gtxt{flex:1;min-width:0}
  .gcard .gt{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .gcard .gs{font-size:12px;color:var(--muted);margin-top:3px}
  .cbadge{background:var(--grad);color:#071116;font-size:11px;font-weight:800;min-width:19px;height:19px;padding:0 6px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;animation:popin .3s ease}
  .gbar{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--muted)}
  .gbar b{color:var(--ink);font-size:18px;font-weight:800;margin-left:4px}
  .result{text-align:center;padding:26px 10px;animation:rise .4s ease}
  .result .rscore{font-size:56px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  .result .rcap{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .lb{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin:18px auto 0;max-width:340px;text-align:left;box-shadow:var(--shadow)}
  .lb-h{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .lb-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
  .lb-row b{color:var(--accent)}
  .lbv{display:flex;align-items:baseline;gap:6px}
  .lbv i{font-style:normal;font-size:10px;color:var(--muted)}
  .lb-empty{font-size:13px;color:var(--muted)}
  .racts{display:flex;gap:9px;justify-content:center;margin-top:18px}
  .racts button{padding:11px 22px;border-radius:13px;font-size:14px;font-weight:800;transition:transform .12s}
  .racts button:active{transform:scale(.94)}
  .racts .save{background:var(--grad);color:#071116;box-shadow:0 6px 18px rgba(114,213,255,.24)}
  .racts .cancel{color:var(--muted)}
  .rxn{width:100%;height:46vh;border-radius:var(--r);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;transition:background .12s,transform .12s;box-shadow:var(--shadow)}
  .rxn:active{transform:scale(.99)}
  .rxn.wait{background:var(--card2);color:var(--muted)}
  .rxn.go{background:var(--grad);color:#071116}
  .rxn.early{background:#4E3230;color:#FFB59B}
  .rxn.done{background:var(--done-dim);color:#BFEFD4}
  #rxn-lb{margin-top:16px}
  .tstatus{text-align:center;font-size:15px;font-weight:800;margin:2px 0 4px;min-height:22px}
  .ttt{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:310px;margin:14px auto}
  .tcell{aspect-ratio:1;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:16px;font-size:40px;display:flex;align-items:center;justify-content:center;transition:transform .1s,border-color .12s;box-shadow:var(--shadow)}
  .tcell:active{border-color:var(--accent);transform:scale(.94)}
  .holdpad{width:100%;height:44vh;border-radius:var(--r);border:1px solid var(--line);background:linear-gradient(180deg,var(--card2),var(--card));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);
    touch-action:none;-webkit-user-select:none;user-select:none;transition:background .2s,transform .12s}
  .holdpad:active{transform:scale(.99)}
  .holdpad.arm{background:linear-gradient(180deg,#3A2431,#2B1A24);border-color:var(--accent-dim)}
  .holdpad .hbig{font-size:44px;font-weight:800}
  .holdpad .hsm{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

  /* ===== kegel ===== */
  .kintro{color:var(--muted);font-size:13px;line-height:1.65;margin-bottom:16px}
  .klevels{display:flex;flex-direction:column;gap:10px}
  .klev{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:15px;padding:15px 17px;text-align:left;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;animation:rise .45s ease backwards}
  .klev:active{border-color:var(--accent);transform:scale(.98)}
  .klev b{font-size:16px}
  .klev span{font-size:12px;color:var(--muted)}
  .kbar{height:7px;background:var(--card);border-radius:5px;overflow:hidden;margin:6px 0 8px;border:1px solid var(--line)}
  .kbarfill{height:100%;width:0;background:var(--grad);background-size:220px 100%;animation:shim 2.4s linear infinite;transition:width .5s linear}
  .korbwrap{position:relative;height:250px;display:flex;align-items:center;justify-content:center}
  .korb{width:126px;height:126px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#071116;font-weight:800;font-size:14px;letter-spacing:.06em;box-shadow:0 0 60px var(--game-glow,rgba(114,213,255,.3))}
  .kphase{text-align:center;font-size:21px;font-weight:800;min-height:27px;margin-top:4px;letter-spacing:-.01em}
  .kcount{text-align:center;font-size:44px;font-weight:800;color:var(--muted);min-height:52px}
  .kbreathe{text-align:center;font-size:11px;color:var(--muted);margin:4px 0 6px;letter-spacing:.05em}
  .ktag{text-align:center;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .kcritter{position:absolute;top:-4px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:6;pointer-events:none}
  .kcritter .bub{background:var(--ink);color:#071116;font-size:12px;font-weight:800;padding:7px 13px;border-radius:14px;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.5);position:relative}
  .kcritter .bub:after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink);border-bottom:0}
  .kcritter .crit{font-size:33px;margin-top:2px;animation:bob 1.4s ease-in-out infinite}
  .kbcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:8px;text-align:left}
  .kbtop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .kbtop b{font-size:14px}
  .kbtop span{font-size:11px;color:var(--muted);white-space:nowrap}
  .khist{margin-top:8px;border-top:1px solid var(--line);padding-top:8px;display:flex;flex-direction:column;gap:4px}
  .kh{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);gap:10px}
  .kh span:first-child{color:var(--ink);font-weight:700}

  /* ===== chat ===== */
  .chatwrap{height:58vh;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:4px 2px;overscroll-behavior:contain}
  .msg{max-width:82%;display:flex;flex-direction:column;gap:2px}
  .msg.me{align-self:flex-end;align-items:flex-end}
  .msg.them{align-self:flex-start}
  .msg .mw{font-size:10px;color:var(--muted);margin-left:8px}
  .msg .mb{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;word-break:break-word;box-shadow:0 3px 10px rgba(0,0,0,.22)}
  .msg.me .mb{background:var(--grad);color:#071116;border-bottom-right-radius:6px}
  .msg.them .mb{background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:6px}
  .msg .mt{font-size:9px;color:var(--muted);margin:2px 8px 0}
  .msg.me .mt{align-self:flex-end}
  .chatbar{display:flex;gap:9px;margin-top:12px}
  .chatbar input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 15px;font-size:16px;transition:border-color .15s}
  .chatbar input:focus{outline:none;border-color:var(--accent)}
  .chatbar button{width:48px;height:48px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0;border-radius:50%;background:var(--grad);color:#071116;box-shadow:0 6px 16px rgba(114,213,255,.24);transition:transform .12s}
  .chatbar button:active{transform:scale(.88)}

  /* ===== calendar ===== */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin:2px 0 10px}
  .calhead button{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-size:18px;color:var(--muted);transition:transform .12s}
  .calhead button:active{transform:scale(.9);color:var(--accent)}
  .calhead .cm{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .calstreak{text-align:center;font-size:13px;color:var(--accent);margin-bottom:13px;font-weight:700}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cdow{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;font-weight:700;letter-spacing:.04em}
  .cday{aspect-ratio:1;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;transition:transform .1s,background .15s}
  .cday:active{transform:scale(.9)}
  .cday.on{background:var(--grad);color:#071116;border-color:transparent;box-shadow:0 4px 14px rgba(114,213,255,.24)}
  .cday.today{outline:2px solid var(--accent);outline-offset:-2px}
  .cdn{font-size:13px;line-height:1}
  .ctag{font-size:8px;font-weight:800;letter-spacing:.02em;line-height:1;background:rgba(0,0,0,.2);padding:1px 4px;border-radius:5px;margin-top:1px;font-style:normal}
  .cday.on .ctag{background:rgba(0,0,0,.24);color:#071116}
  .calhint{text-align:center;font-size:11px;color:var(--muted);margin-top:14px}
  .histwrap{margin-top:22px}
  .histuser{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px}
  .hu{font-size:13px;font-weight:800;margin-bottom:8px}
  .hrow{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:3px 0;gap:10px}
  .hrow span:first-child{color:var(--ink);font-weight:700}
  .picker{position:fixed;inset:0;z-index:9000;background:rgba(8,5,9,.66);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
  .picksheet{background:var(--card2);border-top-left-radius:22px;border-top-right-radius:22px;width:100%;max-width:540px;padding:18px 16px calc(28px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto;animation:rise .3s cubic-bezier(.2,.8,.3,1);border-top:1px solid var(--line2)}
  .pickh{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:0 2px 12px}
  .pickopt{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;font-size:14px;font-weight:700;margin-bottom:8px;transition:border-color .12s,transform .12s}
  .pickopt:active{border-color:var(--accent);transform:scale(.985)}
  .pickopt.clr{color:var(--muted)}
  .pickopt.cancel{text-align:center;color:var(--muted);background:none;border:none;margin-top:4px}

  /* ===== game themes ===== */
  .game-theme{--game-glow:rgba(114,213,255,.22)}
  .theme-kegel{--accent:#E88BC4;--accent2:#A78BFA;--accent-soft:rgba(232,139,196,.15);--accent-dim:#4A2A43;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(232,139,196,.24)}
  .theme-hold{--accent:#F6C768;--accent2:#F59E0B;--accent-soft:rgba(246,199,104,.15);--accent-dim:#493719;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(246,199,104,.24)}
  .theme-random{--accent:#FF8A65;--accent2:#FB7185;--accent-soft:rgba(255,138,101,.15);--accent-dim:#4C2B29;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(255,138,101,.24)}
  .theme-ttt{--accent:#F0B45B;--accent2:#79AFFF;--accent-soft:rgba(240,180,91,.15);--accent-dim:#44351F;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(121,175,255,.24)}
  .theme-reaction{--accent:#E8F56A;--accent2:#76E6C2;--accent-soft:rgba(232,245,106,.14);--accent-dim:#38421E;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(232,245,106,.22)}
  .theme-wordle{--accent:#66D19E;--accent2:#E7C35B;--accent-soft:rgba(102,209,158,.14);--accent-dim:#285040;--grad:linear-gradient(135deg,var(--accent),#86E1B5);--game-glow:rgba(102,209,158,.22)}
  .theme-rps{--accent:#8BB8FF;--accent2:#C6A7FF;--accent-soft:rgba(139,184,255,.14);--accent-dim:#2E4668;--grad:linear-gradient(135deg,var(--accent),var(--accent2));--game-glow:rgba(139,184,255,.24)}
  .gcard.game-theme{border-color:var(--accent-dim)}
  .gcard.game-theme .gico{background:var(--accent-soft);box-shadow:0 0 24px var(--game-glow)}
  .gcard.game-theme:active{border-color:var(--accent)}
  .game-theme .shead h2{color:var(--accent)}
  .game-theme .racts .save{box-shadow:0 8px 24px var(--game-glow)}
  .game-theme .result .rscore{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tttlegend{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
  .tttrole{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:12px;color:var(--muted)}
  .tttrole.me{border-color:var(--accent);color:var(--ink)}
  .tttrole .animal{font-size:18px}
  .tcell.hamster{background:linear-gradient(180deg,#3B3020,#241E17);border-color:#6A512C}
  .tcell.elephant{background:linear-gradient(180deg,#21334D,#182332);border-color:#34547A}
  .tcell:disabled{cursor:default}
  .word-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:-6px auto 12px;max-width:340px;color:var(--muted);font-size:10px;letter-spacing:.09em;text-transform:uppercase}
  .word-status{text-align:center;min-height:22px;font-size:13px;font-weight:750;margin-bottom:12px;color:var(--ink)}
  .word-grid{display:grid;grid-template-rows:repeat(6,1fr);gap:6px;width:min(100%,330px);margin:0 auto 16px}
  .word-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .word-tile{aspect-ratio:1;border-radius:10px;border:1px solid var(--line2);background:var(--card);display:grid;place-items:center;font-size:clamp(20px,7vw,30px);font-weight:850;text-transform:uppercase;transition:transform .16s,background .16s,border-color .16s;color:var(--ink)}
  .word-tile.filled{border-color:#597082;background:var(--card2)}
  .word-tile.correct,.word-key.correct{background:#347B5B;border-color:#55B985;color:#F7FFFB}
  .word-tile.present,.word-key.present{background:#8B6A24;border-color:#D0A942;color:#FFF9EA}
  .word-tile.absent,.word-key.absent{background:#252E38;border-color:#35414E;color:#83909C}
  .word-entry{display:flex;gap:8px;width:min(100%,330px);margin:0 auto 12px}
  .word-entry input{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;text-transform:uppercase;letter-spacing:.22em;text-align:center;font-size:16px;font-weight:800}
  .word-entry input:focus{outline:none;border-color:var(--accent)}
  .word-entry button{padding:0 16px;border-radius:12px;background:var(--grad);color:#071116;font-weight:850}
  .word-entry[hidden]{display:none}
  .word-keyboard{display:flex;flex-direction:column;gap:6px;width:min(100%,480px);margin:0 auto}
  .word-krow{display:flex;justify-content:center;gap:5px}
  .word-key{height:42px;min-width:0;flex:1;border-radius:8px;background:var(--card2);border:1px solid var(--line);font-size:11px;font-weight:800;text-transform:uppercase;transition:transform .1s,background .15s}
  .word-key:active{transform:scale(.91)}
  .word-key.wide{flex:1.55;font-size:10px}
  .word-peers{width:min(100%,380px);margin:17px auto 0;padding:13px 15px;border-radius:14px;background:var(--card);border:1px solid var(--line)}
  .word-peer{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:5px 0;font-size:12px;color:var(--muted)}
  .word-peer b{color:var(--ink)}
  .rps-score{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:10px;align-items:stretch;margin:8px auto 18px;max-width:430px}
  .rps-player{padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--line);text-align:center;min-width:0}
  .rps-player.me{border-color:var(--accent)}

async function migrateSessionRef(ref,day){
  return runTransaction(db,async tx=>{const snap=await tx.get(ref);if(!snap.exists())return false;const raw=snap.data();if(!sessionNeedsMigration(raw))return false;const migrated=shape(day,raw);tx.set(ref,{schemaVersion:SESSION_SCHEMA,exercises:migrated.exercises},{merge:true});return true;});
}
async function migrateExistingSessions(){
  if(migrationStarted||!auth.currentUser)return;migrationStarted=true;
  try{
    const metaRef=doc(db,'meta','app'),metaSnap=await getDoc(metaRef),meta=metaSnap.exists()?(metaSnap.data()||{}):{};
    if(+meta.sessionSchema>=SESSION_SCHEMA)return;
    let refs=[],listedAll=false;
    try{const snaps=await getDocs(collection(db,'sessions'));snaps.forEach(s=>refs.push(s.ref));listedAll=true;}catch(e){for(let w=1;w<=MAX_WEEK_SEEN;w++)PROGRAM.forEach(day=>refs.push(dref(w,day.id)));}
    let migrated=0;
    let failures=0;
    for(let p=0;p<refs.length;p+=6){const batch=refs.slice(p,p+6);const results=await Promise.all(batch.map(ref=>{const m=ref.id.match(/^w(\d+)-d(\d+)$/),day=m&&PROGRAM.find(d=>d.id===+m[2]);if(m)MAX_WEEK_SEEN=Math.max(MAX_WEEK_SEEN,+m[1]);return day?migrateSessionRef(ref,day).then(changed=>({ok:true,changed:changed})).catch(()=>({ok:false,changed:false})):Promise.resolve({ok:true,changed:false});}));migrated+=results.filter(r=>r.changed).length;failures+=results.filter(r=>!r.ok).length;}
    const marker={maxWeekSeen:MAX_WEEK_SEEN,lastMigrationCount:migrated,lastMigrationAt:Date.now()};if(listedAll)marker.sessionSchema=SESSION_SCHEMA;
    if(failures)delete marker.sessionSchema;
    await setDoc(metaRef,marker,{merge:true});historyCache={};
    if(failures)migrationStarted=false;
  }catch(e){console.warn('session migration',e);migrationStarted=false;}
}

async function ensureDay(wk,id){
  const day=PROGRAM.find(d=>d.id===id);
  const snap=await getDoc(dref(wk,id));
  if(snap.exists())return;
  let seed=null;
  if(wk>1){const p=await getDoc(dref(wk-1,id));if(p.exists())seed=carry(p.data(),day);}
  if(!seed)seed=seedFromProgram(day);
  await setDoc(dref(wk,id),seed);
}

async function openDay(id){

function refreshSession(day){
  if(view.screen!=="session"||view.dayId!==day.id)return;
  const d=state[key(WEEK,day.id)];
  d.exercises.forEach((e,i)=>{
    setIfBlur('en-'+i,e.name);setIfBlur('ld-'+i,e.load||'');
    setIfBlur('es-'+i,e.ts);setIfBlur('er-'+i,e.tr);
    {const su=document.getElementById('eu-'+i);if(su&&document.activeElement!==su&&su.value!==e.unit)su.value=e.unit;const rl=document.getElementById('rl-'+i);if(rl)rl.textContent=isSec(e)?'Secs':'Reps';}

    if(!document.querySelector('#st-'+i+' :focus'))drawSets(day,i);
    patchEx(day,i);

/* ---------- realtime Rock Paper Scissors ---------- */
const RPS_MOVES={rock:{icon:'\u270A',label:'Rock'},paper:{icon:'\u270B',label:'Paper'},scissors:{icon:'\u270C\uFE0F',label:'Scissors'}};
let rpsLastResult='';

}

function rpsOutcome(a,b){if(a===b)return'draw';return(a==='rock'&&b==='scissors')||(a==='paper'&&b==='rock')||(a==='scissors'&&b==='paper')?'A':'B';}

}

}

function drawRPS(raw,myRole,me,ref){
  const d=normaliseRPS(raw),ready=!!(d.players.A&&d.players.B),other=myRole==='A'?'B':'A',score=document.getElementById('rps-score'),status=document.getElementById('rps-status'),choices=document.getElementById('rps-choices'),reveal=document.getElementById('rps-reveal'),next=document.getElementById('rps-next');if(!choices)return;

function buildRoutine(d){
  const c=KDIFF[d],ph=[];ph.push({t:'relax',l:'Get ready \u2014 breathe',s:3});
  for(let i=0;i<c.reps;i++){ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});}
  ph.push({t:'hold',l:'Long hold \u2014 keep breathing',s:c.hold});ph.push({t:'release',l:'Release slowly',s:3});
  for(let i=0;i<c.pulses;i++){ph.push({t:'pulse',l:'Pulse!',s:1});ph.push({t:'pulserel',l:'\u00b7',s:1});}
  let used=ph.reduce((a,b)=>a+b.s,0);const target=c.total-20;
  while(used<target){const left=target-used;
    if(left>=c.hold+5&&Math.random()<.45){ph.push({t:'prep',l:'Hold next',s:2});ph.push({t:'hold',l:'Hold the squeeze',s:c.hold});ph.push({t:'release',l:'Release',s:3});used+=c.hold+5;}
    else if(left>=4){ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});used+=4;}
    else{ph.push({t:'relax',l:'Breathe and reset',s:left});used+=left;}}
  ph.push({t:'reverse',l:'Reverse kegel \u2014 relax & gently bear down',s:20});
  return ph;
}
function startKegel(d){

  document.getElementById('kstop').onclick=renderKegel;

    otx.textContent=(p.t==='hold'||p.t==='squeeze'||p.t==='pulse')?'SQUEEZE':(p.t==='reverse'||p.t==='relax')?'RELAX':(p.t==='release'||p.t==='pulserel')?'let go':'';
    if(p.t==='squeeze'||p.t==='pulse')sound('squeeze');else if(p.t==='hold')sound('hold');else if(p.t==='release'||p.t==='pulserel')sound('release');else if(p.t==='relax'||p.t==='reverse')sound('relax');
    if(navigator.vibrate){if(p.t==='squeeze'||p.t==='pulse')navigator.vibrate(35);else if(p.t==='hold')navigator.vibrate(80);}
  }
  const BREATHE=['Breathe\u2026','Don\u2019t hold your breath!','In through the nose\u2026','\u2026out through the mouth','keep breathing','slow & steady'];
  function showCritter(on){ const c=document.getElementById('kcrit'); if(!c)return;

      c.animate([{transform:'translateX(-50%) translateY(14px) scale(.5)',opacity:0},{transform:'translateX(-50%) translateY(0) scale(1)',opacity:1}],{duration:320,easing:'cubic-bezier(.2,1.5,.3,1)'});

  }

}

/* ---- realtime tic-tac-toe ---- */
const TWIN=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function tttWinner(b){ for(const l of TWIN){ if(b[l[0]]&&b[l[0]]===b[l[1]]&&b[l[1]]===b[l[2]])return b[l[0]]; } return b.every(x=>x)?'draw':''; }
function normaliseTTT(raw){
  const d=raw||{},old=d.players||{},cv=v=>v==='X'?'H':v==='O'?'E':v;
  return {board:(Array.isArray(d.board)?d.board:Array(9).fill('')).map(cv),turn:cv(d.turn)||'H',winner:cv(d.winner)||'',players:{H:old.H||old.X||'',E:old.E||old.O||''},starter:d.starter||'',round:d.round||0};
}
function tttRole(players,email){return players.H===email?'H':players.E===email?'E':null;}
async function claimTTTRole(ref,me){let claimed=null;
  await runTransaction(db,async tx=>{const snap=await tx.get(ref),d=normaliseTTT(snap.exists()?snap.data():null),players=Object.assign({},d.players);claimed=tttRole(players,me);
    if(!claimed)claimed=!players.H?'H':(!players.E&&players.H!==me?'E':null);if(!claimed)return;players[claimed]=me;
    const first=!d.starter&&d.board.every(x=>!x),next={players:players,board:d.board,turn:d.turn,winner:d.winner,round:d.round};
    if(first){next.starter=me;next.turn=claimed;}tx.set(ref,next,{merge:true});});return claimed;
}
async function startTTTRound(ref,me){
  await runTransaction(db,async tx=>{const snap=await tx.get(ref),d=normaliseTTT(snap.exists()?snap.data():null),role=tttRole(d.players,me);if(!role)throw new Error('Only a seated player can start a round.');
    tx.set(ref,{board:Array(9).fill(''),turn:role,winner:'',starter:me,round:(d.round||0)+1,players:d.players},{merge:true});});
}
function renderTTT(){

  let msg;if(!myRole)msg='Spectating \u2014 both seats are taken';else if(!ready)msg='You are '+sym(myRole)+' \u2014 waiting for an opponent';else if(winner==='draw')msg='Draw!';else if(winner)msg=(winner===myRole?'You win! ':'Partner wins ')+sym(winner);else msg=(turn===myRole?('Your move '+sym(myRole)):('Waiting for '+sym(turn)));

  view={screen:"game",dayId:null}; clearSubs(); clearGameTimers();
  const TARGET=10000;

/* ---------- sound engine (synthesized, no files) ---------- */
const SND={ctx:null,muted:false};
try{SND.muted=localStorage.getItem('pel_snd')==='0';}catch(e){}
function sndIcon(){const b=document.getElementById('sndBtn');if(b)b.innerHTML=SND.muted?'&#128263;':'&#128266;';}
function sndInit(){ if(SND.ctx)return; try{const AC=window.AudioContext||window.webkitAudioContext; if(AC)SND.ctx=new AC();}catch(e){} }
document.addEventListener('pointerdown',()=>{ sndInit(); if(SND.ctx&&SND.ctx.state==='suspended')SND.ctx.resume().catch(()=>{}); },{passive:true});
(function(){const b=document.getElementById('sndBtn'); if(b){ sndIcon(); b.onclick=()=>{SND.muted=!SND.muted; try{localStorage.setItem('pel_snd',SND.muted?'0':'1');}catch(e){} sndIcon(); if(!SND.muted)sound('tap');};}})();
function tone(f0,f1,dur,type,vol,when){ const c=SND.ctx; if(!c)return;
  const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine';
  const t=c.currentTime+(when||0);
  o.frequency.setValueAtTime(f0,t); if(f1&&f1!==f0)o.frequency.exponentialRampToValueAtTime(f1,t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+0.03);
}
function noise(dur,vol,fStart,fEnd){ const c=SND.ctx; if(!c)return;
  const n=Math.floor(c.sampleRate*dur),buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const src=c.createBufferSource();src.buffer=buf;
  const f=c.createBiquadFilter();f.type='lowpass';const t=c.currentTime;
  f.frequency.setValueAtTime(fStart||3200,t); f.frequency.exponentialRampToValueAtTime(fEnd||420,t+dur);
  const g=c.createGain();g.gain.setValueAtTime(vol||0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f).connect(g).connect(c.destination);src.start(t);src.stop(t+dur+0.03);
}
function sound(name){
  if(SND.muted)return; sndInit(); const c=SND.ctx; if(!c)return;
  if(c.state==='suspended'){c.resume().catch(()=>{});}
  try{ switch(name){
    case 'tap': tone(660,760,0.06,'sine',0.1); break;
    case 'tick': tone(420,360,0.05,'sine',0.08); break;
    case 'pop': tone(520,880,0.09,'triangle',0.12); break;
    case 'msg': tone(740,988,0.12,'sine',0.11); tone(988,740,0.1,'sine',0.07,0.09); break;
    case 'success': tone(659,659,0.11,'sine',0.13); tone(880,880,0.13,'sine',0.13,0.1); tone(1175,1175,0.2,'sine',0.11,0.2); break;
    case 'win': tone(523,523,0.12,'triangle',0.12); tone(659,659,0.12,'triangle',0.12,0.11); tone(784,784,0.12,'triangle',0.12,0.22); tone(1047,1047,0.26,'triangle',0.12,0.33); break;
    case 'splash': noise(0.55,0.24,3600,300); tone(240,120,0.4,'sine',0.08); break;
    case 'impact': noise(0.96,0.4,3200,70); noise(0.34,0.2,7600,900); tone(86,36,0.92,'sine',0.22); tone(175,58,0.46,'triangle',0.14,0.04); tone(48,34,0.72,'sine',0.16,0.08); break;
    case 'squeeze': tone(520,560,0.1,'sine',0.12); break;
    case 'hold': tone(600,640,0.28,'sine',0.1); break;
    case 'release': tone(420,260,0.18,'sine',0.1); break;
    case 'relax': tone(300,240,0.5,'sine',0.07); break;
  } }catch(e){}
}
let splashSeenT=0, splashCoolUntil=0, splashCounts={}, splashWatchStarted=false;

function startSplashWatch(){

function sendSplash(){

function splashToast(txt){
  const t=document.createElement('div'); t.className='stoast'; t.textContent=txt; document.body.appendChild(t);
  t.animate([{opacity:0,transform:'translateX(-50%) translateY(-8px)'},{opacity:1,transform:'translateX(-50%) translateY(0)'}],{duration:240,easing:'ease-out',fill:'forwards'});
  setTimeout(()=>{ t.animate([{opacity:1},{opacity:0}],{duration:320,fill:'forwards'}); setTimeout(()=>t.remove(),340); },1900);
}
function splashTallyHTML(myKey){
  const keys=Object.keys(splashCounts||{}); if(!keys.length)return '\uD83C\uDF0A No splashes yet \u2014 catch each other online.';
  const mine=splashCounts[myKey]||0;
  let otherK=null; keys.forEach(k=>{ if(k!==myKey)otherK=k; });
  const theirs=otherK?(splashCounts[otherK]||0):0;
  return '\uD83C\uDF0A Splashes received \u2014 you: <b>'+mine+'</b>'+(otherK?' \u00b7 '+keyName(otherK)+': <b>'+theirs+'</b>':'');
}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setWeek(w){if(view.screen!=="home"&&view.screen!=="session")return;WEEK=Math.max(1,w);MAX_WEEK_SEEN=Math.max(MAX_WEEK_SEEN,WEEK);document.getElementById('wkNum').textContent=WEEK;setDoc(doc(db,'meta','app'),{week:WEEK,maxWeekSeen:MAX_WEEK_SEEN},{merge:true}).catch(()=>{});if(view.screen==="home")renderHome();else openDay(view.dayId);}
document.getElementById('wkUp').onclick=()=>setWeek(WEEK+1);
document.getElementById('wkDown').onclick=()=>setWeek(WEEK-1);

function handleErr(e){
  if(e&&e.code==="permission-denied"){clearSubs();
    app.innerHTML='<div class="center"><h2>No access</h2><p>This account isn\u2019t on the allow-list. Ask the coach to add your email to the Firestore rules.</p><button class="gbtn" id="so2">Use a different account</button></div>';
    const b=document.getElementById('so2');if(b)b.onclick=()=>signOut(auth);}
}
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||'');
function doSignIn(){
  if(isMobile){ signInWithRedirect(auth,provider); return; }
  signInWithPopup(auth,provider).catch(e=>{
    const c=e&&e.code||'';
    if(c.indexOf('popup')>=0||c==='auth/operation-not-supported-in-this-environment'||c==='auth/cancelled-popup-request'){ signInWithRedirect(auth,provider); }
    else alert(e.message||e);
  });
}
getRedirectResult(auth).catch(e=>{ console.warn('redirect',e); if(e&&e.code==='auth/unauthorized-domain'){ alert('This site\u2019s web address isn\u2019t authorised in Firebase yet. Add it under Authentication \u2192 Settings \u2192 Authorized domains.'); } });
function signInScreen(){
  introShown=false;
  document.getElementById('live').style.display='none';
  app.innerHTML='<div class="center"><h2>Pelooty 🍑</h2><p>Private coaching log. Sign in to continue.</p><button class="gbtn" id="gin"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.46 14.97.5 12 .5A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 4.75 12 4.75z"/></svg>Sign in with Google</button></div>';
  document.getElementById('gin').onclick=doSignIn;
}
onAuthStateChanged(auth,async user=>{ try{clearSubs();clearGameTimers();clearAccountServices();if(user){ document.getElementById('live').style.display=''; introSplash(); try{const ms=await getDoc(doc(db,'meta','app'));if(ms.exists()){const meta=ms.data();if(meta.week)WEEK=meta.week;MAX_WEEK_SEEN=Math.max(MAX_WEEK_SEEN,+meta.maxWeekSeen||0,WEEK);}}catch(e){} const wn=document.getElementById('wkNum'); if(wn)wn.textContent=WEEK; startClock(); startPresence(); startChatWatch(); startSplashWatch(); renderHome();migrateExistingSessions(); } else signInScreen(); }catch(err){ showFatal((err&&err.stack)||(err&&err.message)||err); } });
</script>
</body>
