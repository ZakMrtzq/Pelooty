<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pelooty</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%91%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#16100E; --card:#221A16; --card2:#2B211C; --line:#3A2D26;
    --ink:#F6EFE9; --muted:#A2938A; --accent:#FF8567; --accent-dim:#5A3A30;
    --done:#7BC99A; --done-dim:#2E4A3A; --live:#7BC99A;
    --r:18px; --pad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-feature-settings:"tnum" 1;}
  body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:40px;overflow-x:hidden;background:radial-gradient(120% 55% at 50% -8%,#271812 0%,var(--bg) 58%) no-repeat fixed}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:inherit;color:inherit}
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:18px var(--pad) 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .dot{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
  .live{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .live .b{width:7px;height:7px;border-radius:50%;background:#5b5b5b}
  .live.on .b{background:var(--live);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,201,154,.5)}70%{box-shadow:0 0 0 6px rgba(123,201,154,0)}100%{box-shadow:0 0 0 0 rgba(123,201,154,0)}}
  .wk{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .wk button{width:30px;height:30px;border-radius:999px;color:var(--muted);font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .wk button:active{background:var(--card2);color:var(--ink)}
  .wk .lab{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted);padding:0 6px;min-width:64px;text-align:center}
  .wk .lab b{color:var(--ink)}
  .screen{padding:0 var(--pad);animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none}.day,.ex,.gcard{animation:none!important}}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:6px 2px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .eyebrow .who{color:var(--muted);text-transform:none;letter-spacing:0;font-size:11px;white-space:nowrap}
  .eyebrow .who button{color:var(--accent);font-weight:600;margin-left:8px}
  .days{display:flex;flex-direction:column;gap:10px}
  .day{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:left;transition:transform .12s,border-color .12s;width:100%;animation:rise .45s ease backwards}
  .day:active{transform:scale(.985);border-color:var(--accent-dim)}
  .ring{width:48px;height:48px;border-radius:14px;flex:0 0 auto;padding:3px;background:conic-gradient(var(--accent) calc(var(--pct,0)*3.6deg),#3A2D26 0);transition:background .4s}
  .day .ix{width:100%;height:100%;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .t-hyp .ix{background:var(--accent-dim);color:var(--accent)}
  .t-neu .ix{background:#26402F;color:var(--done)}
  .t-rest .ix{background:#2A3340;color:#86B8E0}
  .day .body{flex:1;min-width:0}
  .day .body .nm{font-size:15px;font-weight:650}
  .day .body .sub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center}
  .pill{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .pill.hyp{background:var(--accent-dim);color:var(--accent)}
  .pill.neu{background:#26402F;color:var(--done)}
  .pill.rest{background:#2A3340;color:#86B8E0}
  .day .meta{flex:0 0 auto;text-align:right}
  .day .meta .big{font-size:18px;font-weight:800}
  .day .meta .cap{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .chev{color:var(--muted);font-size:20px}
  .back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:600;padding:4px 0;margin-bottom:4px}
  .shead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:2px 0 16px}
  .shead h2{font-size:22px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .shead .date{font-size:12px;color:var(--muted);white-space:nowrap}
  .ex{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;animation:rise .4s ease backwards}
  .ex .row{display:flex;align-items:center;gap:12px;padding:14px 16px;width:100%;text-align:left}
  .ex .nm{flex:1;min-width:0}
  .ex .nm .t{font-size:15px;font-weight:650;line-height:1.2}
  .ex .nm .tg{font-size:11px;color:var(--muted);margin-top:3px}
  .badge{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:var(--card2);color:var(--muted);white-space:nowrap}
  .badge.hit{background:var(--done-dim);color:var(--done)}
  .ex .panel{border-top:1px solid var(--line);padding:14px 16px;display:none;background:#1E1713}
  .ex.open .panel{display:block}
  .chev2{color:var(--muted);font-size:18px;transition:transform .15s}
  .ex.open .chev2{transform:rotate(90deg);color:var(--accent)}
  .sub-h{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  .coach-edit{display:grid;grid-template-columns:1fr 50px 50px 64px;gap:7px;margin-bottom:14px;align-items:end}
  .coach-edit.full{grid-template-columns:1fr}
  .cfield{display:flex;flex-direction:column;gap:4px}
  .cfield label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .cfield input{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-weight:600;width:100%}
  .cfield input:focus{outline:2px solid var(--accent);border-color:transparent}
  .cfield select{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 6px;font-size:13px;font-weight:600;width:100%;color:var(--ink)}
  .cfield select:focus{outline:2px solid var(--accent);border-color:transparent}
  .sets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .set{display:flex;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .set .sx{font-size:10px;color:var(--muted);padding:0 8px}
  .set button{width:34px;height:40px;font-size:18px;font-weight:600;color:var(--muted)}
  .set button:active{background:var(--card2);color:var(--ink)}
  .set .v{min-width:30px;text-align:center;font-size:16px;font-weight:800}
  .set .v.ok{color:var(--done)}
  .set .vIn{width:48px;height:40px;text-align:center;font-size:16px;font-weight:800;background:transparent;border:none;-moz-appearance:textfield}
  .set .vIn::-webkit-outer-spin-button,.set .vIn::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .set .vIn:focus{outline:none;background:var(--card2)}
  .set .vIn.ok{color:var(--done)}
  .set .su{font-size:10px;color:var(--muted);padding:0 8px 0 2px}
  .set .rm{width:30px;height:40px;color:var(--accent);font-size:15px;opacity:.7}
  .addset{height:40px;padding:0 14px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px;font-weight:600}
  .addset:active{border-color:var(--accent);color:var(--accent)}
  .vol{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg);border-radius:12px;padding:11px 14px}
  .vol .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .vol .r{font-size:15px;font-weight:800}
  .vol .r .of{color:var(--muted);font-weight:600;font-size:13px}
  .hint{font-size:12px;margin-top:10px;padding:10px 12px;border-radius:10px;line-height:1.4}
  .hint.go{background:var(--done-dim);color:#B9E8CC}
  .hint.wait{background:var(--card2);color:var(--muted)}
  .pnote{margin-top:14px}
  .pnote h4{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  .pnote textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;resize:vertical;min-height:48px}
  .pnote textarea:focus{outline:2px solid var(--accent);border-color:transparent}
  .pnote+.pnote{margin-top:10px}
  .exdel{margin-top:14px;text-align:right}
  .exdel button{color:var(--accent);font-size:12px;font-weight:600;opacity:.8}
  .addex{width:100%;border:1px dashed var(--line);border-radius:var(--r);padding:14px;color:var(--muted);font-size:14px;font-weight:600;margin-bottom:12px}
  .addex:active{border-color:var(--accent);color:var(--accent)}
  .addform{background:var(--card);border:1px solid var(--accent-dim);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .addform .fr{display:flex;gap:8px;margin-bottom:10px}
  .addform input{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;width:100%}
  .addform input:focus{outline:2px solid var(--accent);border-color:transparent}
  .addform .w{width:72px;flex:0 0 auto;text-align:center}
  .addform .acts{display:flex;gap:8px;justify-content:flex-end}
  .addform .acts button{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700}
  .addform .save{background:var(--accent);color:#241008}
  .addform .cancel{color:var(--muted)}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
  .center h2{font-size:22px;margin-bottom:8px}
  .center p{color:var(--muted);font-size:14px;line-height:1.6;max-width:320px;margin-bottom:22px}
  .gbtn{display:flex;align-items:center;gap:10px;background:#fff;color:#1a1a1a;font-weight:600;font-size:15px;padding:12px 22px;border-radius:12px}
  .gbtn svg{width:18px;height:18px}
  .setup{padding:30px var(--pad)}
  .foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;line-height:1.6;opacity:.7}
  .gcard{display:flex;align-items:center;gap:14px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:left;margin-top:10px;animation:rise .45s ease backwards;transition:transform .12s,border-color .12s}
  .gcard:active{transform:scale(.985);border-color:var(--accent-dim)}
  .gcard .gico{width:46px;height:46px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--card2);border-radius:13px}
  .gcard .gtxt{flex:1;min-width:0}
  .gcard .gt{font-size:15px;font-weight:700}
  .gcard .gs{font-size:12px;color:var(--muted);margin-top:3px}
  .gbar{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--muted)}
  .gbar b{color:var(--ink);font-size:18px;font-weight:800;margin-left:4px}
  .gamearea{position:relative;height:58vh;background:#1B1410;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .pp-peach{position:absolute;background:none;border:none;line-height:1;padding:0;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));cursor:pointer}
  .pp-peach.gold{filter:drop-shadow(0 0 12px rgba(255,210,123,.8))}
  .result{text-align:center;padding:24px 10px}
  .result .rscore{font-size:54px;font-weight:800;color:var(--accent);line-height:1}
  .result .rcap{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .lb{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:18px auto 0;max-width:320px;text-align:left}
  .lb-h{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .lb-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
  .lb-row b{color:var(--accent)}
  .lb-empty{font-size:13px;color:var(--muted)}
  .racts{display:flex;gap:8px;justify-content:center;margin-top:18px}
  .racts button{padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700}
  .racts .save{background:var(--accent);color:#241008}
  .racts .cancel{color:var(--muted)}
  .rxn{width:100%;height:46vh;border-radius:var(--r);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;transition:background .1s}
  .rxn.wait{background:#3A2D26;color:var(--muted)}
  .rxn.go{background:var(--accent);color:#241008}
  .rxn.early{background:#5A3A30;color:#FFB59B}
  .rxn.done{background:var(--done-dim);color:#B9E8CC}
  #rxn-lb{margin-top:16px}
  .chatwrap{height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 2px}
  .msg{max-width:80%;display:flex;flex-direction:column;gap:2px}
  .msg.me{align-self:flex-end;align-items:flex-end}
  .msg.them{align-self:flex-start}
  .msg .mw{font-size:10px;color:var(--muted);margin-left:6px}
  .msg .mb{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4;word-break:break-word}
  .msg.me .mb{background:var(--accent);color:#241008;border-bottom-right-radius:5px}
  .msg.them .mb{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px}
  .chatbar{display:flex;gap:8px;margin-top:10px}
  .chatbar input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 14px;font-size:14px}
  .chatbar input:focus{outline:2px solid var(--accent);border-color:transparent}
  .chatbar button{background:var(--accent);color:#241008;font-weight:700;padding:0 18px;border-radius:13px;font-size:14px}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .calhead button{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);font-size:18px;color:var(--muted)}
  .calhead .cm{font-size:16px;font-weight:700}
  .calstreak{text-align:center;font-size:13px;color:var(--accent);margin-bottom:12px;font-weight:600}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cdow{font-size:10px;color:var(--muted);text-align:center;padding:4px 0}
  .cday{aspect-ratio:1;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:transform .1s}
  .cday:active{transform:scale(.92)}
  .cday.on{background:var(--accent);color:#241008;border-color:transparent}
  .cday.today{outline:2px solid var(--accent);outline-offset:-2px}
  .calhint{text-align:center;font-size:11px;color:var(--muted);margin-top:14px}
  .kintro{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:16px}
  .klevels{display:flex;flex-direction:column;gap:10px}
  .klev{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;text-align:left;transition:transform .1s,border-color .1s}
  .klev:active{border-color:var(--accent);transform:scale(.99)}
  .klev b{font-size:16px}
  .klev span{font-size:12px;color:var(--muted)}
  .kbar{height:7px;background:var(--card);border-radius:4px;overflow:hidden;margin-bottom:8px}
  .kbarfill{height:100%;width:0;background:var(--accent)}
  .korbwrap{position:relative;height:240px;display:flex;align-items:center;justify-content:center}
  .korb{width:120px;height:120px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#241008;font-weight:800;font-size:14px;letter-spacing:.06em;box-shadow:0 0 55px rgba(255,133,103,.45)}
  .kphase{text-align:center;font-size:20px;font-weight:800;min-height:26px;margin-top:6px}
  .kcount{text-align:center;font-size:42px;font-weight:800;color:var(--muted);min-height:50px}
  .ktag{text-align:center;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .kcritter{position:absolute;top:-2px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:6;pointer-events:none}
  .kcritter .bub{background:var(--ink);color:#241008;font-size:12px;font-weight:700;padding:7px 13px;border-radius:14px;white-space:nowrap;box-shadow:0 6px 18px rgba(0,0,0,.45);position:relative}

  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .kbreathe{text-align:center;font-size:11px;color:var(--muted);margin:4px 0 6px;letter-spacing:.04em}
  .msg .mt{font-size:9px;color:var(--muted);margin:1px 7px 0}
  .msg.me .mt{align-self:flex-end}
  .msg .mb{box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .chatbar button{width:46px;height:46px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0;border-radius:50%}
  .chatbar button:active{transform:scale(.92)}
  #intro{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 45%,#241712 0%,var(--bg) 70%);pointer-events:none}
  #intro .peach{font-size:120px;will-change:transform,opacity;filter:drop-shadow(0 8px 30px rgba(255,133,103,.4))}
  #fx{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
  .fxbit{position:fixed;will-change:transform,opacity}
</style>
</head>

function liveOn(ok){const el=document.getElementById('live');el.classList.toggle('on',ok);document.getElementById('liveLbl').textContent=ok?'live':'offline';}
function key(wk,id){return 'w'+wk+'-d'+id}
function dref(wk,id){return doc(db,'sessions',key(wk,id))}
function seedFromProgram(day){return {exercises:day.ex.map(e=>({id:uid(),name:e.n,ts:e.ts,tr:e.tr,load:e.load,unit:e.unit||"reps",sets:Array(e.ts).fill(0),cnote:"",anote:""}))};}
function carry(prev){return {exercises:(prev.exercises||[]).map(e=>({id:uid(),name:e.name,ts:e.ts,tr:e.tr,load:e.load,unit:e.unit||"reps",sets:Array(e.ts).fill(0),cnote:"",anote:""}))};}
function shape(day,d){d=d||{};if(!Array.isArray(d.exercises))d.exercises=seedFromProgram(day).exercises;d.exercises.forEach(e=>{if(!Array.isArray(e.sets))e.sets=Array(e.ts||1).fill(0);if(e.cnote==null)e.cnote="";if(e.anote==null)e.anote="";if(!e.unit)e.unit="reps";});return d;}
let saveT={};
function save(wk,id){const k=key(wk,id);clearTimeout(saveT[k]);saveT[k]=setTimeout(()=>{setDoc(dref(wk,id),state[k],{merge:true}).catch(e=>console.warn(e));},300);}
const vol=e=>(e.sets||[]).reduce((a,b)=>a+(+b||0),0);
const tgt=e=>(e.ts||0)*(e.tr||0);
const hit=e=>(e.sets||[]).length>=e.ts && (e.sets||[]).slice(0,e.ts).every(v=>v>=e.tr);
const doneCount=d=>(d.exercises||[]).filter(hit).length;
const isSec=e=>e.unit==="sec";
const suf=e=>isSec(e)?"s":"";
const stepOf=e=>isSec(e)?5:1;
const unitWord=e=>isSec(e)?"sec":"reps";

async function ensureDay(wk,id){
  const day=PROGRAM.find(d=>d.id===id);
  const snap=await getDoc(dref(wk,id));
  if(snap.exists())return;
  let seed=null;
  if(wk>1){const p=await getDoc(dref(wk-1,id));if(p.exists())seed=carry(p.data());}
  if(!seed)seed=seedFromProgram(day);
  await setDoc(dref(wk,id),seed);
}

async function openDay(id){
  view={screen:"session",dayId:id};clearSubs();clearGameTimers();renderedIds="";
  try{await ensureDay(WEEK,id);}catch(e){handleErr(e);}
  const day=PROGRAM.find(d=>d.id===id);
  const u=onSnapshot(dref(WEEK,id),snap=>{liveOn(true);
    const d=shape(day,snap.exists()?snap.data():seedFromProgram(day));
    state[key(WEEK,id)]=d;
    const ids=d.exercises.map(e=>e.id).join(',');
    if(ids!==renderedIds){renderSession(day);renderedIds=ids;}else refreshSession(day);
  },err=>{liveOn(false);handleErr(err);});
  subs.push(u);
}

    bindInput('ld-'+i,val=>{e.load=val;patchEx(day,i);},day);
    bindNum('es-'+i,val=>{e.ts=Math.max(1,val);patchEx(day,i);},day);

function bindInput(id,fn,day){const el=document.getElementById(id);if(!el)return;el.oninput=()=>{fn(el.value);save(WEEK,day.id);};}
function bindNum(id,fn,day){const el=document.getElementById(id);if(!el)return;el.oninput=()=>{fn(parseInt(el.value)||1);save(WEEK,day.id);};}

function showAddForm(day){

function refreshSession(day){
  if(view.screen!=="session"||view.dayId!==day.id)return;
  const d=state[key(WEEK,day.id)];
  d.exercises.forEach((e,i)=>{
    setIfBlur('en-'+i,e.name);setIfBlur('ld-'+i,e.load||'');
    setIfBlur('es-'+i,e.ts);setIfBlur('er-'+i,e.tr);
    {const su=document.getElementById('eu-'+i);if(su&&document.activeElement!==su&&su.value!==e.unit)su.value=e.unit;const rl=document.getElementById('rl-'+i);if(rl)rl.textContent=isSec(e)?'Secs':'Reps';}
    setIfBlur('cn-'+i,e.cnote||'');setIfBlur('an-'+i,e.anote||'');
    if(!document.querySelector('#st-'+i+' :focus'))drawSets(day,i);
    patchEx(day,i);
  });
}
function setIfBlur(id,val){const el=document.getElementById(id);if(el&&document.activeElement!==el&&el.value!=(val+''))el.value=val;}

function hintText(hi,v,t,word){word=word||"reps";if(hi)return "\u2713 Hit target at this load. Next session: hold and add a little, or step the load up.";const need=t-v;return need>0?need+" more "+word+" at this load to complete the target.":"Log your sets to track volume.";}

function drawSets(day,i){
  const d=state[key(WEEK,day.id)],e=d.exercises[i],wrap=document.getElementById('st-'+i);
  if(!wrap||!e)return;const st=stepOf(e);let h='';
  (e.sets||[]).forEach((v,si)=>{const ok=v>=e.tr;
    h+='<div class="set"><span class="sx">'+(si+1)+'</span><button data-a="dec" data-s="'+si+'">&minus;</button>'+
       '<input class="vIn num '+(ok?'ok':'')+'" type="number" inputmode="numeric" min="0" data-s="'+si+'" value="'+v+'"/>'+
       '<button data-a="inc" data-s="'+si+'">+</button>'+((e.sets.length>e.ts)?'<button class="rm" data-a="rm" data-s="'+si+'">\u2715</button>':'')+
       (isSec(e)?'<span class="su">s</span>':'')+'</div>';});
  h+='<button class="addset" data-a="add">+ set</button>';wrap.innerHTML=h;
  wrap.querySelectorAll('.vIn').forEach(inp=>{
    inp.oninput=()=>{const si=+inp.dataset.s,arr=e.sets,was=hit(e);
      let val=parseInt(inp.value);if(isNaN(val))val=0;val=Math.max(0,val);arr[si]=val;
      inp.classList.toggle('ok',val>=e.tr);patchEx(day,i);save(WEEK,day.id);
      if(!was&&hit(e))celebrate();};
  });
  wrap.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const a=b.dataset.a,si=+b.dataset.s,arr=e.sets,was=hit(e);
    if(a==="inc")arr[si]=(+arr[si]||0)+st;else if(a==="dec")arr[si]=Math.max(0,(+arr[si]||0)-st);
    else if(a==="add")arr.push(0);else if(a==="rm")arr.splice(si,1);
    save(WEEK,day.id);drawSets(day,i);patchEx(day,i);
    if(!was&&hit(e))celebrate();
  });
}

function patchEx(day,i){
  const d=state[key(WEEK,day.id)],e=d.exercises[i];if(!e)return;
  const v=vol(e),t=tgt(e),hi=hit(e);
  setTxt('t-'+i,e.name);
  const tg=document.getElementById('tg-'+i);if(tg)tg.innerHTML='target '+e.ts+' \u00D7 '+e.tr+suf(e)+' &middot; '+esc(e.load||'');
  setTxt('vv-'+i,v);setTxt('tt-'+i,t);
  const vl=document.getElementById('vl-'+i);if(vl)vl.innerHTML='Volume &middot; '+(isSec(e)?'seconds held':'reps at load');
  setTxt('vu-'+i,unitWord(e));
  const bd=document.getElementById('bd-'+i);if(bd){bd.textContent=hi?'100%':v+'/'+t;bd.classList.toggle('hit',hi);}
  const hint=document.getElementById('hint-'+i);if(hint){hint.className='hint '+(hi?'go':'wait');hint.textContent=hintText(hi,v,t,unitWord(e));}
}
function setTxt(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}

  ov.appendChild(p); document.body.appendChild(ov);
  p.animate([
    {transform:'scale(0) rotate(-25deg)',opacity:0,offset:0},
    {transform:'scale(1.12) rotate(12deg)',opacity:1,offset:.16},
    {transform:'scale(1) rotate(-10deg)',opacity:1,offset:.28},
    {transform:'scale(1.07) rotate(9deg)',opacity:1,offset:.4},
    {transform:'scale(1) rotate(-8deg)',opacity:1,offset:.52},

    {transform:'scale(1.05) rotate(4deg)',opacity:1,offset:.88},
    {transform:'scale(1.3) rotate(0deg)',opacity:1,offset:1}
  ],{duration:2600,easing:'cubic-bezier(.3,.7,.3,1)',fill:'forwards'});
  setTimeout(()=>{
    // PUNCH — pops, does not fade
    p.animate([{transform:'scale(1.3)'},{transform:'scale(2.15)'},{transform:'scale(1.5)'}],{duration:300,easing:'cubic-bezier(.2,1.5,.3,1)',fill:'forwards'});

  setTimeout(()=>{ ov.remove(); },4150);
}
function bigSplash(parent){
  parent=parent||document.body;
  const cx=innerWidth/2, cy=innerHeight*0.46;

    parent.appendChild(ring); const sc=16+r*8;
    ring.animate([{transform:'scale(.2)',opacity:.9},{transform:'scale('+sc+')',opacity:0}],{duration:700+r*220,easing:'ease-out',fill:'forwards'});
    setTimeout(()=>ring.remove(),1000+r*220);
  }
  const maxd=Math.hypot(innerWidth,innerHeight)*0.72;
  for(let i=0;i<90;i++){
    const wet=Math.random()<0.22; const d=document.createElement('div'); d.className='fxbit'; const sz=8+Math.random()*28;
    if(wet){d.textContent='\uD83D\uDCA6';d.style.fontSize=(14+Math.random()*24)+'px';}
    else{d.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:50% 50% 58% 58%;background:radial-gradient(circle at 35% 28%,rgba(198,234,255,.97),rgba(110,170,225,.42));box-shadow:0 0 10px rgba(150,205,255,.4)';}
    d.style.left=cx+'px';d.style.top=cy+'px';parent.appendChild(d);
    const ang=Math.random()*Math.PI*2,dist=90+Math.random()*maxd;const dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist;
    d.animate([{transform:'translate(0,0) scale(.3)',opacity:1},{transform:'translate('+(dx*.65)+'px,'+(dy*.65)+'px) scale(1)',opacity:1,offset:.4},{transform:'translate('+dx+'px,'+(dy+240)+'px) scale(.9) scaleY(2.3)',opacity:0}],{duration:1100+Math.random()*750,easing:'cubic-bezier(.2,.6,.4,1)',fill:'forwards'});
    setTimeout(()=>d.remove(),1950);
  }
  for(let i=0;i<55;i++){
    const x=Math.random()*innerWidth, y=Math.random()*innerHeight, sz=10+Math.random()*34;
    const s2=document.createElement('div'); s2.className='fxbit';

async function saveBest(game,score,lower){
  try{
    const ref=doc(db,'games',game); const snap=await getDoc(ref);
    const data=snap.exists()?snap.data():{bests:{}};

/* ---- kegel trainer ---- */
const KORDER=['Fun','Easy','Medium','Difficult','Extra'];
const KDIFF={Fun:{total:60,hold:5,reps:4,pulses:8},Easy:{total:90,hold:10,reps:6,pulses:10},Medium:{total:150,hold:20,reps:8,pulses:14},Difficult:{total:240,hold:40,reps:10,pulses:18},Extra:{total:300,hold:60,reps:12,pulses:24}};
function kegelCard(){return '<button class="gcard play" id="g-keg"><div class="gico">\uD83C\uDF51</div><div class="gtxt"><div class="gt">Kegel Trainer</div><div class="gs">Squeeze \u00b7 hold \u00b7 pulse \u00b7 reverse</div></div><div class="chev">\u203a</div></button>';}
async function renderKegel(){
  view={screen:"kegel",dayId:null}; clearSubs(); clearGameTimers();
  app.innerHTML='<div class="screen"><button class="back" id="kback">\u2039 Games</button><div class="shead"><h2>Kegel Trainer</h2></div>'+
    '<p class="kintro">Pick a level. You\u2019ll be guided through squeezes, at least one long hold, and quick pulses \u2014 the final 20s is always reverse-kegel relaxation.</p>'+
    '<div class="klevels">'+KORDER.map(d=>'<button class="klev" data-d="'+d+'"><b>'+d+'</b><span>'+(Math.round(KDIFF[d].total/60*10)/10)+' min \u00b7 '+KDIFF[d].hold+'s hold</span></button>').join('')+'</div>'+
    '<div id="kbest"></div></div>';
  document.getElementById('kback').onclick=renderGames;
  app.querySelectorAll('.klev').forEach(b=>b.onclick=()=>startKegel(b.dataset.d));
  const bests=await getBests('kegel'); const el=document.getElementById('kbest');
  if(el)el.innerHTML='<div class="lb"><div class="lb-h">Sessions completed</div>'+bestsHTML(bests,false,'')+'</div>';
}
function buildRoutine(d){
  const c=KDIFF[d];const ph=[];ph.push({t:'relax',l:'Get ready \u2014 breathe',s:5});
  for(let i=0;i<c.reps;i++){ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});}
  ph.push({t:'prep',l:'Long hold next',s:2});ph.push({t:'hold',l:'Hold the squeeze',s:c.hold});ph.push({t:'release',l:'Release slowly',s:4});
  for(let i=0;i<c.pulses;i++){ph.push({t:'pulse',l:'Pulse!',s:1});ph.push({t:'pulserel',l:'\u00b7',s:1});}
  let used=ph.reduce((a,b)=>a+b.s,0);const target=c.total-20;
  while(used<target){if(target-used>=c.hold+6&&Math.random()<.5){ph.push({t:'prep',l:'Hold next',s:2});ph.push({t:'hold',l:'Hold the squeeze',s:c.hold});ph.push({t:'release',l:'Release',s:4});used+=c.hold+6;}else{ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});used+=4;}}
  ph.push({t:'reverse',l:'Reverse kegel \u2014 relax & gently bear down',s:20});
  return ph;
}
function startKegel(d){
  view={screen:"game",dayId:null}; clearGameTimers();
  const ph=buildRoutine(d);const total=ph.reduce((a,b)=>a+b.s,0);let idx=0,elapsed=0;
  app.innerHTML='<div class="screen"><button class="back" id="kstop">\u2039 Stop</button><div class="kbar"><div class="kbarfill" id="kfill"></div></div><div class="korbwrap"><div class="kcritter" id="kcrit"></div><div class="korb" id="korb"><span id="korbtxt"></span></div></div><div class="kphase" id="kphase"></div><div class="kcount num" id="kcount"></div><div class="kbreathe">remember to breathe throughout</div><div class="ktag">'+d+'</div></div>';
  document.getElementById('kstop').onclick=renderKegel;
  const orb=document.getElementById('korb'),otx=document.getElementById('korbtxt'),lab=document.getElementById('kphase'),cnt=document.getElementById('kcount'),fill=document.getElementById('kfill');
  function setOrb(p){
    let sc=1,col='var(--accent)',td=p.s;
    if(p.t==='squeeze'||p.t==='hold'||p.t==='prep'){sc=0.6;col='var(--accent)';td=(p.t==='hold'?0.6:0.7);}
    else if(p.t==='release'){sc=1.15;col='#5A3A30';td=Math.min(2,p.s);}
    else if(p.t==='relax'||p.t==='reverse'){sc=1.55;col='var(--done-dim)';td=1.4;}
    else if(p.t==='pulse'){sc=0.66;col='var(--accent)';td=0.18;}
    else if(p.t==='pulserel'){sc=1.05;col='#5A3A30';td=0.18;}
    orb.style.transition='transform '+td+'s ease, background '+td+'s ease';
    orb.style.transform='scale('+sc+')';orb.style.background=col;
    otx.textContent=(p.t==='hold'||p.t==='squeeze'||p.t==='pulse')?'SQUEEZE':(p.t==='reverse'||p.t==='relax')?'RELAX':(p.t==='release'||p.t==='pulserel')?'let go':'';
    if(navigator.vibrate){if(p.t==='squeeze'||p.t==='pulse')navigator.vibrate(35);else if(p.t==='hold')navigator.vibrate(80);}
  }
  const BREATHE=['Breathe\u2026','Don\u2019t hold your breath!','In through the nose\u2026','\u2026out through the mouth','keep breathing','slow & steady'];
  function showCritter(on){ const c=document.getElementById('kcrit'); if(!c)return;
    if(on){ const emo=Math.random()<0.5?'\uD83D\uDC39':'\uD83D\uDC18'; const msg=BREATHE[Math.floor(Math.random()*BREATHE.length)];
      c.innerHTML='<div class="bub">'+msg+'</div><div class="crit">'+emo+'</div>'; c.style.display='flex';
      c.animate([{transform:'translateX(-50%) translateY(14px) scale(.5)',opacity:0},{transform:'translateX(-50%) translateY(0) scale(1)',opacity:1}],{duration:320,easing:'cubic-bezier(.2,1.5,.3,1)'});
    } else { c.style.display='none'; c.innerHTML=''; } }
  function run(){
    if(idx>=ph.length){finishKegel(d);return;}
    const p=ph[idx];setOrb(p);lab.textContent=p.l;let left=p.s;cnt.textContent=left>1?left:'';
    const holdy=(p.t==='hold'||p.t==='reverse'); showCritter(holdy);
    let bt=null; if(holdy){ bt=setInterval(()=>showCritter(true),3500); gameTimers.push(bt); }
    const iv=setInterval(()=>{left--;elapsed++;if(fill)fill.style.width=Math.min(100,elapsed/total*100)+'%';
      if(left<=0){clearInterval(iv);if(bt)clearInterval(bt);showCritter(false);idx++;run();}else cnt.textContent=left;},1000);
    gameTimers.push(iv);
  }
  run();
}
async function finishKegel(d){
  clearGameTimers();
  try{const ref=doc(db,'games','kegel');const snap=await getDoc(ref);const data=snap.exists()?snap.data():{bests:{}};if(!data.bests)data.bests={};
    const me=auth.currentUser?auth.currentUser.email:'me';const k=sanit(me);const prev=data.bests[k]?data.bests[k].score:0;
    const hp=data.bests[k]?KORDER.indexOf(data.bests[k].hardest||'Fun'):-1;const hd=Math.max(hp,KORDER.indexOf(d));
    data.bests[k]={name:me,score:prev+1,hardest:KORDER[Math.max(0,hd)]};await setDoc(ref,data,{merge:true});
  }catch(e){console.warn(e);}
  const bests=await getBests('kegel');
  app.innerHTML='<div class="screen"><div class="result"><div class="rscore">\u2713</div><div class="rcap">'+d+' session complete</div><div class="lb"><div class="lb-h">Sessions completed</div>'+bestsHTML(bests,false,'')+'</div><div class="racts"><button class="save" id="kagain">Again</button><button class="cancel" id="kdone">Back</button></div></div></div>';
  document.getElementById('kagain').onclick=()=>startKegel(d);
  document.getElementById('kdone').onclick=renderKegel;
}

function handleErr(e){
  if(e&&e.code==="permission-denied"){clearSubs();
    app.innerHTML='<div class="center"><h2>No access</h2><p>This account isn\u2019t on the allow-list. Ask the coach to add your email to the Firestore rules.</p><button class="gbtn" id="so2">Use a different account</button></div>';
    const b=document.getElementById('so2');if(b)b.onclick=()=>signOut(auth);}
}
function signInScreen(){
  document.getElementById('live').style.display='none';
  app.innerHTML='<div class="center"><h2>Pelooty 🍑</h2><p>Private coaching log. Sign in to continue.</p><button class="gbtn" id="gin"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.46 14.97.5 12 .5A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 4.75 12 4.75z"/></svg>Sign in with Google</button></div>';
  document.getElementById('gin').onclick=()=>signInWithPopup(auth,provider).catch(e=>alert(e.message));
}
onAuthStateChanged(auth,async user=>{ if(user){ document.getElementById('live').style.display=''; introSplash(); try{const ms=await getDoc(doc(db,'meta','app')); if(ms.exists()&&ms.data().week)WEEK=ms.data().week;}catch(e){} const wn=document.getElementById('wkNum'); if(wn)wn.textContent=WEEK; renderHome(); } else signInScreen(); });
</script>
