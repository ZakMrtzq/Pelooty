<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Pelooty</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%91%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#100B10; --bg2:#1B1218;
    --card:#1D151B; --card2:#271C23; --line:#332631; --line2:#42303D;
    --ink:#F8F3F0; --muted:#A493A0;
    --accent:#FF8A5C; --accent2:#FF6D7F; --accent-dim:#4E3230; --accent-soft:rgba(255,138,92,.14);
    --done:#6FD9A0; --done-dim:#24463A;
    --blue:#8FB8E8;
    --r:20px; --r-sm:13px; --pad:18px;
    --grad:linear-gradient(135deg,var(--accent),var(--accent2));
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  html,body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-feature-settings:"tnum" 1}
  body{max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:calc(44px + env(safe-area-inset-bottom));overflow-x:hidden;
    background:
      radial-gradient(110% 46% at 50% -6%, #2E1A22 0%, transparent 60%),
      radial-gradient(90% 40% at 50% 108%, #1E1420 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  input,textarea{font-size:16px}
  ::selection{background:var(--accent-soft)}
  ::-webkit-scrollbar{width:0;height:0}

  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,217,160,.55)}70%{box-shadow:0 0 0 7px rgba(111,217,160,0)}100%{box-shadow:0 0 0 0 rgba(111,217,160,0)}}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-3px) rotate(4deg)}}
  @keyframes shim{0%{background-position:-140px 0}100%{background-position:220px 0}}
  @keyframes glowp{0%,100%{box-shadow:0 0 14px rgba(255,138,92,.45)}50%{box-shadow:0 0 26px rgba(255,138,92,.8)}}
  @keyframes popin{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

  /* ===== header ===== */
  .top{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:14px var(--pad) 10px;
    background:rgba(16,11,16,.72);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);
    border-bottom:1px solid rgba(255,255,255,.05)}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .dot{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:21px;
    animation:floaty 4.5s ease-in-out infinite;filter:drop-shadow(0 3px 10px rgba(255,138,92,.35))}
  .brand h1{font-size:15px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sbtn{width:34px;height:34px;border-radius:11px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .12s}
  .sbtn:active{transform:scale(.9)}
  .live{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .live .b{width:7px;height:7px;border-radius:50%;background:#5b4f58}
  .live.on .b{background:var(--done);animation:pulse 2s infinite}
  .wk{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
  .wk button{width:30px;height:30px;border-radius:999px;color:var(--muted);font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .wk button:active{background:var(--card2);color:var(--accent);transform:scale(.9)}
  .wk .lab{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--muted);padding:0 7px;min-width:62px;text-align:center}
  .wk .lab b{color:var(--ink)}
  .clockbar{text-align:center;font-size:12px;color:var(--muted);letter-spacing:.04em;padding:9px 0 2px}
  .presbar{text-align:center;font-size:11px;color:var(--muted);padding:2px 14px 10px;display:none;line-height:1.5}
  .pdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .pdot.on{background:var(--done);animation:pulse 2.4s infinite}
  .pdot.off{background:#5b4f58}

  /* ===== screens ===== */
  .screen{padding:2px var(--pad) 0;animation:fade .3s cubic-bezier(.2,.8,.3,1)}
  @media (prefers-reduced-motion:reduce){.screen,.day,.ex,.gcard,.klev,.brand .dot,.crit{animation:none!important}*{transition-duration:.01ms!important}}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:10px 2px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .eyebrow .who{color:var(--muted);text-transform:none;letter-spacing:0;font-size:11px;white-space:nowrap;display:flex;align-items:center;gap:8px;min-width:0}
  .eyebrow .whoe{overflow:hidden;text-overflow:ellipsis;min-width:0}
  .eyebrow .who button{color:var(--accent);font-weight:700;flex:0 0 auto}

  /* ===== day cards ===== */
  .days{display:flex;flex-direction:column;gap:11px}
  .day{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;text-align:left;width:100%;
    box-shadow:var(--shadow);transition:transform .14s cubic-bezier(.2,.8,.3,1),border-color .14s;animation:rise .5s cubic-bezier(.2,.8,.3,1) backwards}
  .day:active{transform:scale(.975);border-color:var(--accent-dim)}
  .ring{width:50px;height:50px;border-radius:15px;flex:0 0 auto;padding:3px;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*3.6deg),var(--line) 0);transition:background .5s}
  .ring.full{background:conic-gradient(var(--done) 360deg,var(--done) 0);animation:glowp 2.6s ease-in-out infinite}
  .day .ix{width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--bg2)}
  .t-hyp .ix{color:var(--accent)}
  .t-neu .ix{color:var(--done)}
  .t-rest .ix{color:var(--blue)}
  .day .body{flex:1;min-width:0}
  .day .body .nm{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .day .body .sub{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:8px;align-items:center}
  .pill{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .pill.hyp{background:var(--accent-soft);color:var(--accent)}
  .pill.neu{background:rgba(111,217,160,.12);color:var(--done)}
  .pill.rest{background:rgba(143,184,232,.12);color:var(--blue)}
  .day .meta{flex:0 0 auto;text-align:right}
  .day .meta .big{font-size:18px;font-weight:800}
  .day .meta .cap{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
  .chev{color:var(--muted);font-size:20px;flex:0 0 auto;opacity:.7}

  /* ===== session ===== */
  .back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700;padding:8px 0 4px;transition:color .12s}
  .back:active{color:var(--accent)}
  .shead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:4px 0 16px}
  .shead h2{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .shead .date{font-size:12px;color:var(--muted);white-space:nowrap}
  .ex{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--r);
    margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);animation:rise .45s cubic-bezier(.2,.8,.3,1) backwards;transition:border-color .2s}
  .ex.open{border-color:var(--line2)}
  .ex .row{display:flex;align-items:center;gap:12px;padding:15px 16px;width:100%;text-align:left}
  .ex .nm{flex:1;min-width:0}
  .ex .nm .t{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.01em}
  .ex .nm .tg{font-size:11px;color:var(--muted);margin-top:3px}
  .badge{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:999px;
    background:var(--bg2);color:var(--muted);white-space:nowrap;transition:all .2s}
  .badge.hit{background:var(--done-dim);color:var(--done);animation:popin .35s cubic-bezier(.2,1.4,.3,1)}
  .ex .panel{border-top:1px solid var(--line);padding:15px 16px 16px;display:none;background:rgba(0,0,0,.16)}
  .ex.open .panel{display:block;animation:fade .25s ease}
  .chev2{color:var(--muted);font-size:18px;transition:transform .2s cubic-bezier(.2,.8,.3,1);opacity:.7}
  .ex.open .chev2{transform:rotate(90deg);color:var(--accent);opacity:1}
  .sub-h{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  .coach-edit{display:grid;grid-template-columns:minmax(110px,1fr) 56px 56px 74px;gap:8px;margin-bottom:15px;align-items:end}
  @media (max-width:370px){.coach-edit{grid-template-columns:1fr 1fr}}
  .cfield{display:flex;flex-direction:column;gap:5px;min-width:0}
  .cfield label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .cfield input,.cfield select{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 10px;font-size:16px;font-weight:600;width:100%;transition:border-color .15s}
  .cfield input:focus,.cfield select:focus{outline:none;border-color:var(--accent)}
  .sets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}
  .set{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--line);border-radius:13px;overflow:hidden;transition:border-color .15s}
  .set:focus-within{border-color:var(--accent)}
  .set .sx{font-size:10px;color:var(--muted);padding:0 8px}
  .set button{width:36px;height:42px;font-size:18px;font-weight:600;color:var(--muted);transition:all .1s}
  .set button:active{background:var(--card2);color:var(--accent);transform:scale(.88)}
  .set .v{min-width:30px;text-align:center;font-size:16px;font-weight:800}
  .set .v.ok{color:var(--done)}
  .set .vIn{width:52px;height:42px;text-align:center;font-size:16px;font-weight:800;background:transparent;border:none;-moz-appearance:textfield}
  .set .vIn::-webkit-outer-spin-button,.set .vIn::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .set .vIn:focus{outline:none;background:var(--card2)}
  .set .vIn.ok{color:var(--done)}
  .set .su{font-size:10px;color:var(--muted);padding:0 8px 0 2px}
  .set .rm{width:30px;height:42px;color:var(--accent2);font-size:14px;opacity:.75}
  .addset{height:42px;padding:0 15px;border:1px dashed var(--line2);border-radius:13px;color:var(--muted);font-size:13px;font-weight:700;transition:all .15s}
  .addset:active{border-color:var(--accent);color:var(--accent);transform:scale(.96)}
  .vol{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg2);border-radius:13px;padding:12px 14px;border:1px solid var(--line)}
  .vol .l{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted)}
  .vol .r{font-size:16px;font-weight:800}
  .vol .r .of{color:var(--muted);font-weight:600;font-size:13px}
  .hint{font-size:12px;margin-top:10px;padding:11px 13px;border-radius:11px;line-height:1.5;transition:all .25s}
  .hint.go{background:var(--done-dim);color:#BFEFD4}
  .hint.wait{background:var(--card2);color:var(--muted)}
  .pnote{margin-top:14px}
  .pnote h4{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  .pnote textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:16px;line-height:1.5;resize:vertical;min-height:52px;transition:border-color .15s}
  .pnote textarea:focus{outline:none;border-color:var(--accent)}
  .pnote+.pnote{margin-top:10px}
  .exdel{margin-top:14px;text-align:right}
  .exdel button{color:var(--accent2);font-size:12px;font-weight:700;opacity:.85}
  .addex{width:100%;border:1px dashed var(--line2);border-radius:var(--r);padding:15px;color:var(--muted);font-size:14px;font-weight:700;margin-bottom:12px;transition:all .15s}
  .addex:active{border-color:var(--accent);color:var(--accent);transform:scale(.985)}
  .addform{background:var(--card2);border:1px solid var(--accent-dim);border-radius:var(--r);padding:16px;margin-bottom:12px;animation:rise .3s ease;box-shadow:var(--shadow)}
  .addform .fr{display:flex;gap:8px;margin-bottom:10px}
  .addform input{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:16px;width:100%}
  .addform input:focus{outline:none;border-color:var(--accent)}
  .addform .w{width:74px;flex:0 0 auto;text-align:center}
  .addform .acts{display:flex;gap:8px;justify-content:flex-end}
  .addform .acts button{padding:9px 18px;border-radius:11px;font-size:13px;font-weight:800}
  .addform .save{background:var(--grad);color:#2A0F0A}
  .addform .cancel{color:var(--muted)}

  /* ===== home extras / games ===== */
  .gcard{display:flex;align-items:center;gap:14px;width:100%;background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;text-align:left;margin-top:11px;
    box-shadow:var(--shadow);animation:rise .5s cubic-bezier(.2,.8,.3,1) backwards;transition:transform .14s,border-color .14s}
  .gcard:active{transform:scale(.975);border-color:var(--accent-dim)}
  .gcard .gico{width:48px;height:48px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg2);border-radius:14px}
  .gcard .gtxt{flex:1;min-width:0}
  .gcard .gt{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .gcard .gs{font-size:12px;color:var(--muted);margin-top:3px}
  .cbadge{background:var(--grad);color:#2A0F0A;font-size:11px;font-weight:800;min-width:19px;height:19px;padding:0 6px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;animation:popin .3s ease}
  .gbar{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--muted)}
  .gbar b{color:var(--ink);font-size:18px;font-weight:800;margin-left:4px}
  .result{text-align:center;padding:26px 10px;animation:rise .4s ease}
  .result .rscore{font-size:56px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  .result .rcap{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .lb{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin:18px auto 0;max-width:340px;text-align:left;box-shadow:var(--shadow)}
  .lb-h{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .lb-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
  .lb-row b{color:var(--accent)}
  .lb-empty{font-size:13px;color:var(--muted)}
  .racts{display:flex;gap:9px;justify-content:center;margin-top:18px}
  .racts button{padding:11px 22px;border-radius:13px;font-size:14px;font-weight:800;transition:transform .12s}
  .racts button:active{transform:scale(.94)}
  .racts .save{background:var(--grad);color:#2A0F0A;box-shadow:0 6px 18px rgba(255,120,100,.3)}
  .racts .cancel{color:var(--muted)}
  .rxn{width:100%;height:46vh;border-radius:var(--r);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;transition:background .12s,transform .12s;box-shadow:var(--shadow)}
  .rxn:active{transform:scale(.99)}
  .rxn.wait{background:var(--card2);color:var(--muted)}
  .rxn.go{background:var(--grad);color:#2A0F0A}
  .rxn.early{background:#4E3230;color:#FFB59B}
  .rxn.done{background:var(--done-dim);color:#BFEFD4}
  #rxn-lb{margin-top:16px}
  .tstatus{text-align:center;font-size:15px;font-weight:800;margin:2px 0 4px;min-height:22px}
  .ttt{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:310px;margin:14px auto}
  .tcell{aspect-ratio:1;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:16px;font-size:40px;display:flex;align-items:center;justify-content:center;transition:transform .1s,border-color .12s;box-shadow:var(--shadow)}
  .tcell:active{border-color:var(--accent);transform:scale(.94)}
  .holdpad{width:100%;height:44vh;border-radius:var(--r);border:1px solid var(--line);background:linear-gradient(180deg,var(--card2),var(--card));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);
    touch-action:none;-webkit-user-select:none;user-select:none;transition:background .2s,transform .12s}
  .holdpad:active{transform:scale(.99)}
  .holdpad.arm{background:linear-gradient(180deg,#3A2431,#2B1A24);border-color:var(--accent-dim)}
  .holdpad .hbig{font-size:44px;font-weight:800}
  .holdpad .hsm{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

  /* ===== kegel ===== */
  .kintro{color:var(--muted);font-size:13px;line-height:1.65;margin-bottom:16px}
  .klevels{display:flex;flex-direction:column;gap:10px}
  .klev{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:15px;padding:15px 17px;text-align:left;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;animation:rise .45s ease backwards}
  .klev:active{border-color:var(--accent);transform:scale(.98)}
  .klev b{font-size:16px}
  .klev span{font-size:12px;color:var(--muted)}
  .kbar{height:7px;background:var(--card);border-radius:5px;overflow:hidden;margin:6px 0 8px;border:1px solid var(--line)}
  .kbarfill{height:100%;width:0;background:var(--grad);background-size:220px 100%;animation:shim 2.4s linear infinite;transition:width .5s linear}
  .korbwrap{position:relative;height:250px;display:flex;align-items:center;justify-content:center}
  .korb{width:126px;height:126px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#2A0F0A;font-weight:800;font-size:14px;letter-spacing:.06em;box-shadow:0 0 60px rgba(255,130,95,.45)}
  .kphase{text-align:center;font-size:21px;font-weight:800;min-height:27px;margin-top:4px;letter-spacing:-.01em}
  .kcount{text-align:center;font-size:44px;font-weight:800;color:var(--muted);min-height:52px}
  .kbreathe{text-align:center;font-size:11px;color:var(--muted);margin:4px 0 6px;letter-spacing:.05em}
  .ktag{text-align:center;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .kcritter{position:absolute;top:-4px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:6;pointer-events:none}
  .kcritter .bub{background:var(--ink);color:#2A0F0A;font-size:12px;font-weight:800;padding:7px 13px;border-radius:14px;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.5);position:relative}
  .kcritter .bub:after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink);border-bottom:0}
  .kcritter .crit{font-size:33px;margin-top:2px;animation:bob 1.4s ease-in-out infinite}
  .kbcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:8px;text-align:left}
  .kbtop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}

function carry(prev){return {exercises:(prev.exercises||[]).map(e=>({id:uid(),name:e.name,ts:e.ts,tr:e.tr,load:e.load,unit:e.unit||"reps",sets:Array(e.ts).fill(0),cnote:"",anote:""}))};}
function shape(day,d){d=d||{};if(!Array.isArray(d.exercises))d.exercises=seedFromProgram(day).exercises;d.exercises.forEach(e=>{if(!Array.isArray(e.sets))e.sets=Array(e.ts||1).fill(0);if(e.cnote==null)e.cnote="";if(e.anote==null)e.anote="";if(!e.unit)e.unit="reps";});return d;}

const isSec=e=>e.unit==="sec";

async function ensureDay(wk,id){
  const day=PROGRAM.find(d=>d.id===id);
  const snap=await getDoc(dref(wk,id));
  if(snap.exists())return;
  let seed=null;
  if(wk>1){const p=await getDoc(dref(wk-1,id));if(p.exists())seed=carry(p.data());}
  if(!seed)seed=seedFromProgram(day);
  await setDoc(dref(wk,id),seed);
}

async function openDay(id){
  view={screen:"session",dayId:id};clearSubs();clearGameTimers();renderedIds="";
  try{await ensureDay(WEEK,id);}catch(e){handleErr(e);}
  const day=PROGRAM.find(d=>d.id===id);
  const u=onSnapshot(dref(WEEK,id),snap=>{liveOn(true);
    const d=shape(day,snap.exists()?snap.data():seedFromProgram(day));
    state[key(WEEK,id)]=d;
    const ids=d.exercises.map(e=>e.id).join(',');

function drawSets(day,i){
  const d=state[key(WEEK,day.id)],e=d.exercises[i],wrap=document.getElementById('st-'+i);
  if(!wrap||!e)return;const st=stepOf(e);let h='';
  (e.sets||[]).forEach((v,si)=>{const ok=v>=e.tr;
    h+='<div class="set"><span class="sx">'+(si+1)+'</span><button data-a="dec" data-s="'+si+'">&minus;</button>'+
       '<input class="vIn num '+(ok?'ok':'')+'" type="number" inputmode="numeric" min="0" data-s="'+si+'" value="'+v+'"/>'+
       '<button data-a="inc" data-s="'+si+'">+</button>'+((e.sets.length>e.ts)?'<button class="rm" data-a="rm" data-s="'+si+'">\u2715</button>':'')+
       (isSec(e)?'<span class="su">s</span>':'')+'</div>';});
  h+='<button class="addset" data-a="add">+ set</button>';wrap.innerHTML=h;
  wrap.querySelectorAll('.vIn').forEach(inp=>{
    inp.oninput=()=>{const ex=curEx(day,i)||e,si=+inp.dataset.s,arr=ex.sets,was=hit(ex);
      let val=parseInt(inp.value);if(isNaN(val))val=0;val=Math.max(0,val);arr[si]=val;
      inp.classList.toggle('ok',val>=ex.tr);patchEx(day,i);save(WEEK,day.id);
      if(!was&&hit(ex))celebrate();};
  });
  wrap.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const a=b.dataset.a,si=+b.dataset.s,arr=e.sets,was=hit(e);
    if(a==="inc"){arr[si]=(+arr[si]||0)+st;sound('tap');}else if(a==="dec"){arr[si]=Math.max(0,(+arr[si]||0)-st);sound('tick');}
    else if(a==="add"){arr.push(0);sound('pop');}else if(a==="rm"){arr.splice(si,1);sound('tick');}
    save(WEEK,day.id);drawSets(day,i);patchEx(day,i);
    if(!was&&hit(e))celebrate();
  });
}

function patchEx(day,i){

const sanit=e=>(e||'').replace(/[^a-z0-9]/gi,'_');
async function saveBest(game,score,lower){
  try{
    const ref=doc(db,'games',game); const snap=await getDoc(ref);
    const data=snap.exists()?snap.data():{bests:{}};
    if(!data.bests)data.bests={};
    const me=auth.currentUser?auth.currentUser.email:'me'; const k=sanit(me);
    const cur=data.bests[k]?data.bests[k].score:(lower?Infinity:-Infinity);
    if((lower&&score<cur)||(!lower&&score>cur)){ data.bests[k]={name:me,score}; await setDoc(ref,data,{merge:true}); }
    return data.bests;
  }catch(e){return null;}
}

function bestsHTML(bests,lower,unit){
  const arr=Object.values(bests||{}).sort((a,b)=>lower?a.score-b.score:b.score-a.score);

  document.getElementById('cback').onclick=renderHome;

  markChatRead();

function appendChat(msgs,me){
  const w=document.getElementById('chatwrap'); if(!w)return;
  const empty=document.getElementById('chatempty');
  if(!msgs.length){ if(empty)empty.textContent='No messages yet \u2014 say hi.'; return; }
  if(empty)empty.remove();
  const atBottom=w.scrollHeight-w.scrollTop-w.clientHeight<120;
  for(let i=chatRendered;i<msgs.length;i++){
    const m=msgs[i],mine=m.e===me,who=(m.e||'').split('@')[0];
    const tm=new Date(m.t||Date.now()),hh=String(tm.getHours()).padStart(2,'0'),mm=String(tm.getMinutes()).padStart(2,'0');
    const el=document.createElement('div'); el.className='msg '+(mine?'me':'them');
    el.innerHTML=(mine?'':'<span class="mw">'+esc(who)+'</span>')+'<span class="mb">'+esc(m.txt)+'</span><span class="mt">'+hh+':'+mm+'</span>';
    w.appendChild(el);
    el.animate([{transform:(mine?'translateX(14px)':'translateX(-14px)')+' translateY(8px) scale(.95)',opacity:0},{transform:'none',opacity:1}],{duration:260,easing:'cubic-bezier(.2,.9,.3,1)'});

function buildRoutine(d){
  const c=KDIFF[d];const ph=[];ph.push({t:'relax',l:'Get ready \u2014 breathe',s:5});
  for(let i=0;i<c.reps;i++){ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});}
  ph.push({t:'prep',l:'Long hold next',s:2});ph.push({t:'hold',l:'Hold the squeeze',s:c.hold});ph.push({t:'release',l:'Release slowly',s:4});
  for(let i=0;i<c.pulses;i++){ph.push({t:'pulse',l:'Pulse!',s:1});ph.push({t:'pulserel',l:'\u00b7',s:1});}
  let used=ph.reduce((a,b)=>a+b.s,0);const target=c.total-20;
  while(used<target){if(target-used>=c.hold+6&&Math.random()<.5){ph.push({t:'prep',l:'Hold next',s:2});ph.push({t:'hold',l:'Hold the squeeze',s:c.hold});ph.push({t:'release',l:'Release',s:4});used+=c.hold+6;}else{ph.push({t:'squeeze',l:'Squeeze',s:2});ph.push({t:'release',l:'Let go',s:2});used+=4;}}
  ph.push({t:'reverse',l:'Reverse kegel \u2014 relax & gently bear down',s:20});
  return ph;
}
function startKegel(d){
  view={screen:"game",dayId:null}; clearGameTimers();

  document.getElementById('kstop').onclick=renderKegel;
  const orb=document.getElementById('korb'),otx=document.getElementById('korbtxt'),lab=document.getElementById('kphase'),cnt=document.getElementById('kcount'),fill=document.getElementById('kfill');
  function setOrb(p){
    let sc=1,col='var(--accent)',td=p.s;
    if(p.t==='squeeze'||p.t==='hold'||p.t==='prep'){sc=0.6;col='var(--accent)';td=(p.t==='hold'?0.6:0.7);}
    else if(p.t==='release'){sc=1.15;col='#5A3A30';td=Math.min(2,p.s);}
    else if(p.t==='relax'||p.t==='reverse'){sc=1.55;col='var(--done-dim)';td=1.4;}
    else if(p.t==='pulse'){sc=0.66;col='var(--accent)';td=0.18;}
    else if(p.t==='pulserel'){sc=1.05;col='#5A3A30';td=0.18;}
    orb.style.transition='transform '+td+'s ease, background '+td+'s ease';
    orb.style.transform='scale('+sc+')';orb.style.background=col;
    otx.textContent=(p.t==='hold'||p.t==='squeeze'||p.t==='pulse')?'SQUEEZE':(p.t==='reverse'||p.t==='relax')?'RELAX':(p.t==='release'||p.t==='pulserel')?'let go':'';
    if(p.t==='squeeze'||p.t==='pulse')sound('squeeze');else if(p.t==='hold')sound('hold');else if(p.t==='release'||p.t==='pulserel')sound('release');else if(p.t==='relax'||p.t==='reverse')sound('relax');
    if(navigator.vibrate){if(p.t==='squeeze'||p.t==='pulse')navigator.vibrate(35);else if(p.t==='hold')navigator.vibrate(80);}
  }
  const BREATHE=['Breathe\u2026','Don\u2019t hold your breath!','In through the nose\u2026','\u2026out through the mouth','keep breathing','slow & steady'];
  function showCritter(on){ const c=document.getElementById('kcrit'); if(!c)return;
    if(on){ const emo=Math.random()<0.5?'\uD83D\uDC39':'\uD83D\uDC18'; const msg=BREATHE[Math.floor(Math.random()*BREATHE.length)];
      c.innerHTML='<div class="bub">'+msg+'</div><div class="crit">'+emo+'</div>'; c.style.display='flex';
      c.animate([{transform:'translateX(-50%) translateY(14px) scale(.5)',opacity:0},{transform:'translateX(-50%) translateY(0) scale(1)',opacity:1}],{duration:320,easing:'cubic-bezier(.2,1.5,.3,1)'});
    } else { c.style.display='none'; c.innerHTML=''; } }
  function run(){
    if(idx>=ph.length){finishKegel(d);return;}
    const p=ph[idx];setOrb(p);lab.textContent=p.l;let left=p.s;cnt.textContent=left>1?left:'';
    const holdy=(p.t==='hold'||p.t==='reverse'); showCritter(holdy);

    const iv=setInterval(()=>{left--;elapsed++;if(fill)fill.style.width=Math.min(100,elapsed/total*100)+'%';
      if(left<=0){clearInterval(iv);if(bt)clearInterval(bt);showCritter(false);idx++;run();}else cnt.textContent=left;},1000);
    gameTimers.push(iv);
  }
  run();
}

const TWIN=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function tttWinner(b){ for(const l of TWIN){ if(b[l[0]]&&b[l[0]]===b[l[1]]&&b[l[1]]===b[l[2]])return b[l[0]]; } return b.every(x=>x)?'draw':''; }

function drawTTT(d,myMark,me,ref){
  const board=d.board||Array(9).fill(''),turn=d.turn||'X',winner=d.winner||'';
  const sym=m=>m==='X'?'\uD83C\uDF51':m==='O'?'\uD83D\uDC18':'';

  let msg; if(!myMark)msg='Spectating \u2014 board is full'; else if(winner==='draw')msg='Draw!'; else if(winner)msg=(winner===myMark?'You win! ':'Partner wins ')+sym(winner); else msg=(turn===myMark?('Your move '+sym(myMark)):('Waiting for partner '+sym(turn)));

}
/* ---- steady hold: release at exactly 10.00s by feel ---- */
function playHold(){
  view={screen:"game",dayId:null}; clearSubs(); clearGameTimers();
  const TARGET=10000;
  app.innerHTML='<div class="screen"><button class="back" id="hback">\u2039 Games</button><div class="shead"><h2>Steady Hold \u23F1\uFE0F</h2></div>'+
    '<p class="kintro">Press and hold the pad. The count hides after 3 seconds \u2014 release when you feel exactly <b>10.00s</b> has passed. Smallest deviation wins.</p>'+
    '<button class="holdpad" id="hpad"><span class="hbig" id="hbig">Hold me</span><span class="hsm" id="hsm">press & keep holding</span></button>'+
    '<div id="hres"></div></div>';
  document.getElementById('hback').onclick=renderGames;
  const pad=document.getElementById('hpad'),big=document.getElementById('hbig'),sm=document.getElementById('hsm');
  let t0=0,iv=null,holding=false;
  pad.addEventListener('contextmenu',e=>e.preventDefault());
  function cancelHold(msg){ if(!holding)return; holding=false; if(iv)clearInterval(iv); pad.classList.remove('arm'); big.textContent='Hold me'; sm.textContent=msg||'press & keep holding'; }
  pad.addEventListener('pointerdown',e=>{ e.preventDefault(); if(holding)return; holding=true; t0=performance.now(); pad.classList.add('arm'); sound('tap'); sm.textContent='release at 10.00s';
    iv=setInterval(()=>{ const el=performance.now()-t0;
      if(el<3000){ big.textContent=(el/1000).toFixed(1)+'s'; }
      else { big.textContent='\u00b7 \u00b7 \u00b7'; sm.textContent='trust your feel\u2026'; }
    },90); gameTimers.push(iv); });
  async function finish(e){ if(!holding)return; holding=false; if(iv)clearInterval(iv); pad.classList.remove('arm');
    const dt=performance.now()-t0;
    if(dt<1500){ big.textContent='Hold me'; sm.textContent='too quick \u2014 hold longer'; sound('tick'); return; }
    const dev=Math.round(Math.abs(dt-TARGET)); sound(dev<300?'success':'pop');
    big.textContent=(dt/1000).toFixed(2)+'s'; sm.textContent='off by '+dev+' ms';
    const bests=await saveBest('steadyhold',dev,true)||await getBests('steadyhold');
    const res=document.getElementById('hres');
    if(res)res.innerHTML='<div class="lb"><div class="lb-h">Best (closest to 10s)</div>'+bestsHTML(bests,true,' ms')+'</div>';
  }
  pad.addEventListener('pointerup',finish);
  pad.addEventListener('pointercancel',()=>cancelHold('interrupted \u2014 try again'));
  pad.addEventListener('pointerleave',()=>{ if(holding)finish(); });
}

/* ---------- sound engine (synthesized, no files) ---------- */
const SND={ctx:null,muted:false};
try{SND.muted=localStorage.getItem('pel_snd')==='0';}catch(e){}
function sndIcon(){const b=document.getElementById('sndBtn');if(b)b.innerHTML=SND.muted?'&#128263;':'&#128266;';}
function sndInit(){ if(SND.ctx)return; try{const AC=window.AudioContext||window.webkitAudioContext; if(AC)SND.ctx=new AC();}catch(e){} }
document.addEventListener('pointerdown',()=>{ sndInit(); if(SND.ctx&&SND.ctx.state==='suspended')SND.ctx.resume().catch(()=>{}); },{passive:true});
(function(){const b=document.getElementById('sndBtn'); if(b){ sndIcon(); b.onclick=()=>{SND.muted=!SND.muted; try{localStorage.setItem('pel_snd',SND.muted?'0':'1');}catch(e){} sndIcon(); if(!SND.muted)sound('tap');};}})();
function tone(f0,f1,dur,type,vol,when){ const c=SND.ctx; if(!c)return;
  const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine';
  const t=c.currentTime+(when||0);
  o.frequency.setValueAtTime(f0,t); if(f1&&f1!==f0)o.frequency.exponentialRampToValueAtTime(f1,t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+0.03);
}
function noise(dur,vol,fStart,fEnd){ const c=SND.ctx; if(!c)return;
  const n=Math.floor(c.sampleRate*dur),buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const src=c.createBufferSource();src.buffer=buf;
  const f=c.createBiquadFilter();f.type='lowpass';const t=c.currentTime;
  f.frequency.setValueAtTime(fStart||3200,t); f.frequency.exponentialRampToValueAtTime(fEnd||420,t+dur);
  const g=c.createGain();g.gain.setValueAtTime(vol||0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f).connect(g).connect(c.destination);src.start(t);src.stop(t+dur+0.03);
}
function sound(name){
  if(SND.muted)return; sndInit(); const c=SND.ctx; if(!c)return;
  if(c.state==='suspended'){c.resume().catch(()=>{});}
  try{ switch(name){
    case 'tap': tone(660,760,0.06,'sine',0.1); break;
    case 'tick': tone(420,360,0.05,'sine',0.08); break;
    case 'pop': tone(520,880,0.09,'triangle',0.12); break;
    case 'msg': tone(740,988,0.12,'sine',0.11); tone(988,740,0.1,'sine',0.07,0.09); break;
    case 'success': tone(659,659,0.11,'sine',0.13); tone(880,880,0.13,'sine',0.13,0.1); tone(1175,1175,0.2,'sine',0.11,0.2); break;
    case 'win': tone(523,523,0.12,'triangle',0.12); tone(659,659,0.12,'triangle',0.12,0.11); tone(784,784,0.12,'triangle',0.12,0.22); tone(1047,1047,0.26,'triangle',0.12,0.33); break;
    case 'splash': noise(0.55,0.24,3600,300); tone(240,120,0.4,'sine',0.08); break;
    case 'squeeze': tone(520,560,0.1,'sine',0.12); break;
    case 'hold': tone(600,640,0.28,'sine',0.1); break;
    case 'release': tone(420,260,0.18,'sine',0.1); break;
    case 'relax': tone(300,240,0.5,'sine',0.07); break;
  } }catch(e){}
}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setWeek(w){if(view.screen!=="home"&&view.screen!=="session")return;WEEK=Math.max(1,w);document.getElementById('wkNum').textContent=WEEK;setDoc(doc(db,'meta','app'),{week:WEEK},{merge:true}).catch(()=>{});if(view.screen==="home")renderHome();else openDay(view.dayId);}
document.getElementById('wkUp').onclick=()=>setWeek(WEEK+1);
document.getElementById('wkDown').onclick=()=>setWeek(WEEK-1);

function handleErr(e){
  if(e&&e.code==="permission-denied"){clearSubs();
    app.innerHTML='<div class="center"><h2>No access</h2><p>This account isn\u2019t on the allow-list. Ask the coach to add your email to the Firestore rules.</p><button class="gbtn" id="so2">Use a different account</button></div>';
    const b=document.getElementById('so2');if(b)b.onclick=()=>signOut(auth);}
}
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||'');
function doSignIn(){
  if(isMobile){ signInWithRedirect(auth,provider); return; }
  signInWithPopup(auth,provider).catch(e=>{
    const c=e&&e.code||'';
    if(c.indexOf('popup')>=0||c==='auth/operation-not-supported-in-this-environment'||c==='auth/cancelled-popup-request'){ signInWithRedirect(auth,provider); }
    else alert(e.message||e);
  });
}
getRedirectResult(auth).catch(e=>{ console.warn('redirect',e); if(e&&e.code==='auth/unauthorized-domain'){ alert('This site\u2019s web address isn\u2019t authorised in Firebase yet. Add it under Authentication \u2192 Settings \u2192 Authorized domains.'); } });
function signInScreen(){
  document.getElementById('live').style.display='none';
  app.innerHTML='<div class="center"><h2>Pelooty 🍑</h2><p>Private coaching log. Sign in to continue.</p><button class="gbtn" id="gin"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.46 14.97.5 12 .5A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 4.75 12 4.75z"/></svg>Sign in with Google</button></div>';
  document.getElementById('gin').onclick=doSignIn;
}
onAuthStateChanged(auth,async user=>{ try{ if(user){ document.getElementById('live').style.display=''; introSplash(); try{const ms=await getDoc(doc(db,'meta','app')); if(ms.exists()&&ms.data().week)WEEK=ms.data().week;}catch(e){} const wn=document.getElementById('wkNum'); if(wn)wn.textContent=WEEK; startClock(); startPresence(); startChatWatch(); renderHome(); } else signInScreen(); }catch(err){ showFatal((err&&err.stack)||(err&&err.message)||err); } });
</script>
